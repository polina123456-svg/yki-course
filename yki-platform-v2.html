<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YKI Study — конструктор курса</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #01184E;
    --navy-2: #0B2A6B;
    --navy-soft: #EAF0FC;
    --bg: #F3F6FB;
    --ink: #101A33;
    --ink-soft: #5A6478;
    --ink-faint: #97A0B3;
    --card: #FFFFFF;
    --border: #E4E8F2;
    --border-strong: #CBD3E6;
    --gold: #E8A33D;
    --gold-soft: #FBF0DC;
    --teal: #2EA8A0;
    --teal-soft: #E2F5F3;
    --coral: #E0654F;
    --coral-soft: #FBEAE6;
    --success: #2F9E58;
    --success-soft: #E6F5EA;
    --danger: #D6503F;
    --danger-soft: #FBE9E6;
    --radius: 12px;
    --radius-lg: 18px;
    --font-ui: 'Manrope', sans-serif;
    --font-read: 'Fraunces', serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-ui); -webkit-font-smoothing: antialiased; }
  #app { min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; background: var(--navy); color: #fff; gap: 16px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--gold), var(--coral));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-read); font-weight: 600; font-size: 16px; color: var(--navy); flex-shrink: 0;
  }
  .brand-text { font-size: 16px; font-weight: 700; letter-spacing: 0.2px; }
  .brand-sub { font-size: 12px; color: #9FB0DE; margin-top: 1px; }

  .mode-toggle { display: flex; background: rgba(255,255,255,0.1); border-radius: 999px; padding: 4px; }
  .mode-toggle button {
    border: none; background: transparent; color: #C6D1EE; font-family: var(--font-ui);
    font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 999px; cursor: pointer; transition: all .15s;
  }
  .mode-toggle button.active { background: var(--gold); color: var(--navy); }

  .layout { display: flex; flex: 1; min-height: 0; }

  .sidebar { width: 310px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
  .picker-group { margin-bottom: 16px; }
  .picker-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--ink-faint); margin-bottom: 6px; font-weight: 700; }
  select { width: 100%; padding: 10px 11px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: #fff; font-family: var(--font-ui); font-size: 14px; color: var(--ink); cursor: pointer; font-weight: 500; }

  .section-divider { height: 1px; background: var(--border); margin: 16px 0; }

  .progress-ring-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 12px 14px; background: var(--navy); border-radius: var(--radius-lg); }
  .progress-ring { flex-shrink: 0; }
  .progress-text { font-size: 12px; color: #B9C7F0; line-height: 1.4; }
  .progress-text b { font-family: var(--font-read); font-size: 18px; color: #fff; }

  .step-list { counter-reset: step; }
  .section-item {
    display: flex; align-items: center; gap: 10px; padding: 11px 11px; border-radius: 10px; cursor: pointer;
    margin-bottom: 5px; border: 1px solid transparent; position: relative;
  }
  .section-item:hover { background: #F7F9FD; }
  .section-item.active { background: var(--navy-soft); border-color: var(--navy-2); }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%; background: var(--border); color: var(--ink-soft);
    font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .section-item.active .step-num { background: var(--navy); color: #fff; }
  .section-item.done .step-num { background: var(--success); color: #fff; }
  .section-item .handle { color: var(--ink-faint); font-size: 12px; cursor: grab; }
  .section-item .title { flex: 1; font-size: 13.5px; color: var(--ink); line-height: 1.35; font-weight: 500; }
  .section-item .menu-dots { color: var(--ink-faint); font-size: 14px; padding: 2px 4px; border-radius: 4px; }
  .section-item .menu-dots:hover { background: var(--border); }

  .add-section-btn {
    width: 100%; padding: 11px; border: 1.5px dashed var(--border-strong); background: transparent;
    border-radius: 10px; color: var(--ink-soft); font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px;
  }
  .add-section-btn:hover { background: var(--navy-soft); border-color: var(--navy-2); color: var(--navy); }

  .homework-pin {
    margin-top: 18px; padding: 12px 14px; border-radius: 10px; background: var(--gold-soft); color: #8A5F16;
    font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px;
  }
  .homework-pin.active { outline: 2px solid var(--gold); }

  .content { flex: 1; overflow-y: auto; padding: 34px 44px; max-width: 940px; }
  .content-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
  .section-title-input {
    font-family: var(--font-read); font-size: 28px; font-weight: 600; border: none; background: transparent;
    width: 100%; color: var(--navy); padding: 4px 0; border-bottom: 2px solid transparent;
  }
  .section-title-input:focus { outline: none; border-bottom-color: var(--navy); }
  .section-title-view { font-family: var(--font-read); font-size: 28px; font-weight: 600; margin: 0 0 6px; color: var(--navy); }

  .body-editor {
    width: 100%; min-height: 220px; font-family: var(--font-ui); font-size: 14px; line-height: 1.7;
    border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 14px; resize: vertical; color: var(--ink);
  }
  .editor-hint { font-size: 11.5px; color: var(--ink-faint); margin: 6px 0 14px; line-height: 1.5; }

  .content-cards { display: flex; flex-direction: column; gap: 14px; }
  .content-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
  .content-card p { margin: 0 0 12px; font-family: var(--font-ui); font-size: 15px; line-height: 1.7; color: var(--ink); }
  .content-card p:last-child { margin-bottom: 0; }
  .content-card strong { font-weight: 700; color: var(--navy); }
  .content-card ul { margin: 0; padding-left: 20px; }
  .content-card li { margin-bottom: 6px; font-size: 15px; line-height: 1.6; }

  .lifehack-card { background: var(--navy); border-radius: var(--radius-lg); padding: 16px 20px; color: #fff; display: flex; gap: 12px; align-items: flex-start; }
  .lifehack-card .badge { background: var(--gold); color: var(--navy); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 6px; flex-shrink: 0; margin-top: 2px; }
  .lifehack-card .text { font-size: 14px; line-height: 1.6; color: #DCE4F7; }

  .quote-card { background: var(--teal-soft); border-radius: var(--radius-lg); padding: 16px 20px; border-left: 4px solid var(--teal); }
  .quote-card .quote-text { font-family: var(--font-read); font-style: italic; font-size: 16px; line-height: 1.7; color: #0E5C56; }

  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .vocab-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .vocab-chip .fi { font-weight: 700; color: var(--navy); font-size: 14px; }
  .vocab-chip .en { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  .vocab-chip .note { font-size: 11.5px; color: var(--teal); margin-top: 4px; }

  .exercises-wrap { margin-top: 30px; }
  .exercises-heading { font-size: 12px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--ink-faint); font-weight: 700; margin-bottom: 12px; }

  .exercise-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 14px; }
  .exercise-type-tag { display: inline-block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 800; padding: 4px 10px; border-radius: 6px; margin-bottom: 10px; }
  .tag-mc { background: var(--navy-soft); color: var(--navy); }
  .tag-tf { background: var(--teal-soft); color: #0E5C56; }
  .tag-open { background: var(--gold-soft); color: #8A5F16; }
  .tag-flash { background: var(--coral-soft); color: var(--coral); }
  .tag-match { background: #EAE2FB; color: #5B3FA0; }
  .tag-fill { background: var(--success-soft); color: var(--success); }

  .exercise-q { font-size: 15.5px; font-weight: 600; margin-bottom: 12px; line-height: 1.5; color: var(--ink); }
  .option-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1.5px solid var(--border-strong); border-radius: 10px; margin-bottom: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all .12s; }
  .option-row:hover { border-color: var(--navy); background: var(--navy-soft); }
  .option-row.correct-answer { border-color: var(--success); background: var(--success-soft); color: #1E6B3B; }
  .option-row.wrong-answer { border-color: var(--danger); background: var(--danger-soft); color: #A83A2C; }

  .btn { font-family: var(--font-ui); font-size: 13.5px; font-weight: 700; padding: 10px 18px; border-radius: 10px; border: 1.5px solid var(--border-strong); background: #fff; color: var(--ink); cursor: pointer; }
  .btn:hover { background: #F7F9FD; }
  .btn-primary { background: var(--navy); border-color: var(--navy); color: #fff; }
  .btn-primary:hover { background: var(--navy-2); }
  .btn-danger-ghost { color: var(--danger); border-color: var(--danger-soft); }
  .btn-sm { padding: 6px 12px; font-size: 12.5px; }

  .feedback-box { margin-top: 12px; padding: 11px 14px; border-radius: 10px; font-size: 13.5px; font-weight: 600; }
  .feedback-correct { background: var(--success-soft); color: #1E6B3B; }
  .feedback-wrong { background: var(--danger-soft); color: #A83A2C; }

  .add-exercise-card { border: 1.5px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 16px 20px; text-align: center; color: var(--ink-soft); cursor: pointer; font-size: 13.5px; font-weight: 600; }
  .add-exercise-card:hover { border-color: var(--navy); background: var(--navy-soft); color: var(--navy); }

  .builder-form { display: flex; flex-direction: column; gap: 10px; }
  .builder-form label { font-size: 12px; color: var(--ink-faint); font-weight: 700; }
  .builder-form input[type="text"], .builder-form textarea, .builder-form select {
    width: 100%; padding: 9px 11px; border: 1px solid var(--border-strong); border-radius: 8px; font-family: var(--font-ui); font-size: 13.5px;
  }
  .option-edit-row { display: flex; align-items: center; gap: 8px; }
  .option-edit-row input[type="text"] { flex: 1; }
  .pair-edit-row { display: flex; align-items: center; gap: 8px; }
  .pair-edit-row input[type="text"] { flex: 1; }

  .flash-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .flash-card { width: 100%; max-width: 420px; height: 220px; perspective: 1200px; cursor: pointer; }
  .flash-inner { position: relative; width: 100%; height: 100%; transition: transform .5s; transform-style: preserve-3d; }
  .flash-card.flipped .flash-inner { transform: rotateY(180deg); }
  .flash-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; font-family: var(--font-read); font-size: 22px; font-weight: 500; }
  .flash-front { background: var(--navy); color: #fff; }
  .flash-back { background: var(--gold-soft); color: #8A5F16; transform: rotateY(180deg); }
  .flash-controls { display: flex; align-items: center; gap: 14px; }
  .flash-counter { font-size: 13px; color: var(--ink-soft); font-weight: 600; }

  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .match-col { display: flex; flex-direction: column; gap: 8px; }
  .match-item { padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border-strong); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .12s; }
  .match-item:hover { border-color: var(--navy); }
  .match-item.selected { border-color: var(--navy); background: var(--navy-soft); }
  .match-item.matched { border-color: var(--success); background: var(--success-soft); color: #1E6B3B; cursor: default; }
  .match-item.wrong-flash { border-color: var(--danger); background: var(--danger-soft); }

  .fill-sentence { font-size: 16px; line-height: 1.8; margin-bottom: 12px; }
  .fill-input { width: 140px; border: none; border-bottom: 2px solid var(--navy); background: var(--navy-soft); font-family: var(--font-ui); font-size: 15px; padding: 4px 8px; text-align: center; border-radius: 6px 6px 0 0; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-faint); }

  @media (max-width: 780px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .content { padding: 20px; }
    .match-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">Y</div>
      <div>
        <div class="brand-text">Hei Study</div>
        <div class="brand-sub" id="lessonCrumb">Модуль 1 · Урок 1.1</div>
      </div>
    </div>
    <div class="mode-toggle">
      <button id="modeEditBtn" class="active">Редактор</button>
      <button id="modeStudyBtn">Прохождение</button>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="picker-group">
        <div class="picker-label">Модуль</div>
        <select id="moduleSelect"></select>
      </div>
      <div class="picker-group">
        <div class="picker-label">Урок</div>
        <select id="lessonSelect"></select>
      </div>

      <div class="progress-ring-wrap" id="progressRingWrap"></div>

      <div class="section-divider"></div>
      <div class="picker-label">Разделы</div>
      <div id="sectionList" class="step-list" style="margin-top: 10px;"></div>
      <button class="add-section-btn" id="addSectionBtn">+ Добавить раздел</button>

      <div class="homework-pin" id="homeworkPin">📌 Для домашней работы</div>
    </aside>
    <main class="content" id="mainContent"></main>
  </div>
</div>

<script>
function uid() { return 'id-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function inlineFormat(s) { s = escapeHtml(s); return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); }

function renderBody(raw) {
  if (!raw) return '<div class="content-card"><p style="color:var(--ink-faint)">Пока пусто. Переключитесь в режим редактора, чтобы добавить текст.</p></div>';
  const lines = raw.split('\n');
  let blocks = []; let buffer = []; let vocabBuffer = [];
  function flushParagraphBuffer() { if (buffer.length) { blocks.push({ type: 'paragraphs', lines: buffer }); buffer = []; } }
  function flushVocab() { if (vocabBuffer.length) { blocks.push({ type: 'vocab', items: vocabBuffer }); vocabBuffer = []; } }
  for (let line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith('LIFEHACK:')) { flushParagraphBuffer(); flushVocab(); blocks.push({ type: 'lifehack', text: trimmed.slice(9).trim() }); continue; }
    if (trimmed.startsWith('QUOTE:')) { flushParagraphBuffer(); flushVocab(); blocks.push({ type: 'quote', text: trimmed.slice(6).trim() }); continue; }
    if (trimmed.startsWith('VOCAB:')) {
      flushParagraphBuffer();
      const parts = trimmed.slice(6).split('|').map(s => s.trim());
      vocabBuffer.push({ fi: parts[0] || '', en: parts[1] || '', note: parts[2] || '' });
      continue;
    }
    flushVocab();
    if (trimmed === '') { continue; }
    buffer.push(trimmed);
  }
  flushParagraphBuffer(); flushVocab();

  let html = '<div class="content-cards">';
  for (const block of blocks) {
    if (block.type === 'lifehack') html += `<div class="lifehack-card"><span class="badge">Lifehack</span><span class="text">${inlineFormat(block.text)}</span></div>`;
    else if (block.type === 'quote') html += `<div class="quote-card"><div class="quote-text">"${inlineFormat(block.text)}"</div></div>`;
    else if (block.type === 'vocab') html += `<div class="content-card"><div class="vocab-grid">${block.items.map(v => `<div class="vocab-chip"><div class="fi">${escapeHtml(v.fi)}</div><div class="en">${escapeHtml(v.en)}</div>${v.note ? `<div class="note">${escapeHtml(v.note)}</div>` : ''}</div>`).join('')}</div></div>`;
    else if (block.type === 'paragraphs') {
      let inner = ''; let inList = false;
      for (const l of block.lines) {
        if (l.startsWith('- ')) { if (!inList) { inner += '<ul>'; inList = true; } inner += `<li>${inlineFormat(l.slice(2))}</li>`; }
        else { if (inList) { inner += '</ul>'; inList = false; } inner += `<p>${inlineFormat(l)}</p>`; }
      }
      if (inList) inner += '</ul>';
      html += `<div class="content-card">${inner}</div>`;
    }
  }
  html += '</div>';
  return html;
}

function seedCourse() {
  return {
    modules: [
      {
        id: uid(),
        title: 'Модуль 1: YKI Foundations',
        lessons: [
          {
            id: uid(),
            title: 'Урок 1.1 — Anatomy of YKI Texts',
            homework: `1. Найдите на сайте муниципалитета любое официальное объявление, определите тип за 5 секунд, выпишите 5 новых слов с грамматическими заметками.\n2. Составьте список из 10 слов-сигналов ловушек.\n3. Возьмите любой текст и напишите 3 вопроса разных форматов.\n4. Перечитайте оба образца текста без перевода — засеките время.`,
            sections: [
              {
                id: uid(),
                title: 'Section 1 — Introduction & Exam Structure',
                body: `80% of mistakes on the YKI happen not because a person doesn't know Finnish, but because they don't understand WHAT exactly each text type is testing and WHAT traps are built into the questions.\n\nMost learners prepare for YKI the way they'd prepare for a school vocabulary test: memorize more words, hope it's enough. But the exam is designed by people who understand exactly how second-language readers make mistakes.\n\nCommon structural failure points:\n- Confusing "not stated" with "false"\n- Anchoring on a familiar word without checking the exact detail\n- Answering from real-world logic instead of what the text says\n- Missing a negation buried in a longer sentence\n\nLIFEHACK: "The 20% Rule" — never spend more than 20% of the section's time on a single text, even if it seems difficult.`,
                exercises: [
                  {
                    id: uid(), type: 'mc',
                    question: 'Why do 80% of mistakes happen on YKI, according to this lesson?',
                    options: [
                      { text: 'Learners don\u2019t know enough Finnish words', correct: false },
                      { text: 'Learners don\u2019t understand what each question format is testing', correct: true },
                      { text: 'The exam texts are too long', correct: false }
                    ]
                  },
                  { id: uid(), type: 'fill', text: 'Never spend more than ___ % of the section\u2019s time on a single text.', answer: '20' }
                ]
              },
              {
                id: uid(),
                title: 'Section 2 — The Four Text Types',
                body: `**Notice (ilmoitus):** what's happening, when, where, what to do.\n\nQUOTE: Hyvät asukkaat, huoltotyöt tehdään tiistaina ja keskiviikkona.\n\n**Personal message:** colloquial forms, emotional tone, causal connectors.\n\n**News (uutinen):** formal kirjakieli, passive voice, facts and figures.\n\n**Instruction (ohje):** obligation constructions, numbered steps, conditionals.\n\nVOCAB: tiedote | notice, announcement | official texts\nVOCAB: uutinen | news item | formal register\nVOCAB: ohje | instruction, guide | step-by-step\n\nLIFEHACK: Look for the "skeleton" of a notice — WHAT, WHEN, WHERE, ACTION.`,
                exercises: [
                  { id: uid(), type: 'tf', statement: 'Passive voice forms like "päätettiin" are a marker typical of the personal message text type.', answer: 'false' },
                  { id: uid(), type: 'match', pairs: [
                    { left: 'tiedote', right: 'notice / announcement' },
                    { left: 'uutinen', right: 'news item' },
                    { left: 'ohje', right: 'instruction / guide' },
                    { left: 'viesti', right: 'personal message' }
                  ] }
                ]
              },
              {
                id: uid(),
                title: 'Section 3 — Worked Examples',
                body: `QUOTE: Taloyhtiön pihalla tehdään huoltotöitä tiistaina ja keskiviikkona klo 8–16. Autoja ei voi jättää pihalle.\n\nMaintenance work in the courtyard July 14–15, 8:00–16:00. Cars must move to the street. Disabled parking stays in use. Phone contact unavailable during works.\n\nVOCAB: tiedote | notice | from tiedottaa\nVOCAB: huoltotyö | maintenance work | huolto + työ\nVOCAB: siirtää | to move, relocate | type 1 verb\nVOCAB: isännöitsijä | property manager | from isäntä\n\nMaria asks Anna to view an apartment on her behalf on Thursday since she has a work shift.\n\nLIFEHACK: Distinguish "not stated" from "implied" — even a logical guess is not the same as a fact stated in the text.`,
                exercises: [
                  { id: uid(), type: 'tf', statement: 'The text says the property manager can be reached by phone during the maintenance work.', answer: 'false' },
                  { id: uid(), type: 'tf', statement: 'Maria has already seen the apartment herself before asking Anna.', answer: 'notstated' },
                  { id: uid(), type: 'flash', cards: [
                    { front: 'tiedote', back: 'notice, announcement' },
                    { front: 'huoltotyö', back: 'maintenance work' },
                    { front: 'siirtää', back: 'to move, relocate' },

                  ] }
                ]
              },
              {
                id: uid(),

                body: `The "First 5 Words" method: the opening words of a text predict its type with 80% accuracy.\n\nFour exam traps:\n- Similar but not the same (wrong date/number)\n- Logical but not stated\n- Partial truth\n- Negation of negation (ellei, paitsi)\n\nVOCAB: ellei | unless | trap-signal word\nVOCAB: paitsi | except | trap-signal word\nVOCAB: poikkeuksena | as an exception | trap-signal word\n\nLIFEHACK: Memorize trap-signal words: ellei, paitsi, poikkeuksena, toisin kuin, sen sijaan, ei kuitenkaan.`,
                exercises: [
                  { id: uid(), type: 'mc', question: 'Which trap does this fall into: the text says a fee is fully waived, but the answer option claims it\u2019s "half price"?', options: [

                  ] },

                ]
              },
              {

                body: `QUOTE: A late fee of 0.20 euros per day per item is charged for late returns. An exception applies to children's books.\n\nComprehensive mini-test: a library notice about late fees. Item considered lost after 60 days.\n\nFinal checklist:\n- I know the structure of the reading section\n- I can distinguish all 4 text types\n- I can identify a text's type within 5 seconds\n- I know all 4 exam trap types\n- I've completed the mini-test and reviewed mistakes`,
                exercises: [
                  { id: uid(), type: 'mc', question: 'How much is the late fee for adult books, according to the practice text?', options: [
                    { text: '€0.10/day', correct: false },
                    { text: '€0.20/day', correct: true },
                    { text: 'No fee at all', correct: false }
                  ] },
                  { id: uid(), type: 'open', question: 'What happens if the material is not returned within 60 days?', answer: 'The item is considered lost and the customer is billed the full replacement cost.' }
                ]
              }
            ]

        ]
      }
    ]
  };
}

let course = null;
let progress = {};
let state = { moduleId: null, lessonId: null, sectionId: null, mode: 'edit', showHomework: false, editingExerciseId: null };
let ephemeral = {};

async function loadState() {
  try { const c = await window.storage.get('yki_course', false); course = c ? JSON.parse(c.value) : seedCourse(); } catch (e) { course = seedCourse(); }
  try { const p = await window.storage.get('yki_progress', false); progress = p ? JSON.parse(p.value) : {}; } catch (e) { progress = {}; }
  state.moduleId = course.modules[0]?.id || null;
  state.lessonId = course.modules[0]?.lessons[0]?.id || null;
  state.sectionId = course.modules[0]?.lessons[0]?.sections[0]?.id || null;
}
async function saveCourse() { try { await window.storage.set('yki_course', JSON.stringify(course), false); } catch (e) { console.error(e); } }
async function saveProgress() { try { await window.storage.set('yki_progress', JSON.stringify(progress), false); } catch (e) { console.error(e); } }

function getModule() { return course.modules.find(m => m.id === state.moduleId); }
function getLesson() { const m = getModule(); return m ? m.lessons.find(l => l.id === state.lessonId) : null; }
function getSection() { const l = getLesson(); return l ? l.sections.find(s => s.id === state.sectionId) : null; }

function exerciseIsDone(ex) {
  const p = progress[ex.id]; if (!p) return false;
  if (ex.type === 'match') return p.status === 'complete';
  return true;
}
function lessonProgressStats(lesson) {
  let total = 0, done = 0;
  for (const sec of lesson.sections) for (const ex of (sec.exercises || [])) { total++; if (exerciseIsDone(ex)) done++; }
  return { total, done };
}
function sectionAllDone(sec) { const exs = sec.exercises || []; return exs.length > 0 && exs.every(ex => exerciseIsDone(ex)); }

function renderAll() { renderTopPickers(); renderProgressRing(); renderSectionList(); renderMain(); renderCrumb(); }
function renderCrumb() { const m = getModule(), l = getLesson(); document.getElementById('lessonCrumb').textContent = `${m ? m.title.replace('Модуль ', 'М.') : ''} · ${l ? l.title : ''}`; }
function renderTopPickers() {
  const modSel = document.getElementById('moduleSelect');
  modSel.innerHTML = course.modules.map(m => `<option value="${m.id}" ${m.id===state.moduleId?'selected':''}>${escapeHtml(m.title)}</option>`).join('');
  const m = getModule();
  const lesSel = document.getElementById('lessonSelect');
  lesSel.innerHTML = m ? m.lessons.map(l => `<option value="${l.id}" ${l.id===state.lessonId?'selected':''}>${escapeHtml(l.title)}</option>`).join('') : '';
}
function renderProgressRing() {
  const l = getLesson(); const wrap = document.getElementById('progressRingWrap');
  if (!l) { wrap.innerHTML = ''; return; }
  const { total, done } = lessonProgressStats(l);
  const pct = total ? Math.round((done/total)*100) : 0;
  const r = 19, circ = 2 * Math.PI * r; const offset = circ - (pct/100)*circ;
  wrap.innerHTML = `
    <svg class="progress-ring" width="46" height="46" viewBox="0 0 46 46">
      <circle cx="23" cy="23" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="5"/>
      <circle cx="23" cy="23" r="${r}" fill="none" stroke="#E8A33D" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" transform="rotate(-90 23 23)"/>
    </svg>
    <div class="progress-text"><b>${pct}%</b><br>${done} из ${total} упражнений</div>
  `;
}
function renderSectionList() {
  const l = getLesson(); const list = document.getElementById('sectionList');
  if (!l) { list.innerHTML = ''; return; }
  list.innerHTML = l.sections.map((sec, idx) => {
    const isActive = sec.id === state.sectionId && !state.showHomework;
    const done = sectionAllDone(sec);
    return `
      <div class="section-item ${isActive ? 'active' : ''} ${done ? 'done' : ''}" data-section-id="${sec.id}">
        <span class="step-num" data-action="select" data-id="${sec.id}">${done ? '✓' : idx+1}</span>
        <span class="title" data-action="select" data-id="${sec.id}">${escapeHtml(sec.title)}</span>
        <span class="handle" data-action="up" data-id="${sec.id}" title="Вверх">↑</span>
        <span class="menu-dots" data-action="delete" data-id="${sec.id}" title="Удалить">✕</span>
      </div>
    `;
  }).join('');
}
function renderMain() {
  const main = document.getElementById('mainContent'); const lesson = getLesson();
  if (!lesson) { main.innerHTML = '<div class="empty-state">Нет уроков. Добавьте раздел или модуль.</div>'; return; }
  if (state.showHomework) { renderHomeworkView(main, lesson); return; }
  const sec = getSection();
  if (!sec) { main.innerHTML = '<div class="empty-state">Выберите раздел слева или создайте новый.</div>'; return; }
  if (state.mode === 'edit') renderEditView(main, sec); else renderStudyView(main, sec);
}
function renderHomeworkView(main, lesson) {
  main.innerHTML = `
    <div class="content-header"><h2 class="section-title-view">📌 Для домашней работы</h2></div>
    ${state.mode === 'edit' ? `<textarea class="body-editor" id="homeworkEditor" style="min-height:180px;">${escapeHtml(lesson.homework || '')}</textarea>` : renderBody(lesson.homework)}
  `;
  if (state.mode === 'edit') document.getElementById('homeworkEditor').addEventListener('input', (e) => { lesson.homework = e.target.value; saveCourse(); });
}
function renderEditView(main, sec) {
  main.innerHTML = `
    <div class="content-header">
      <input class="section-title-input" id="sectionTitleInput" value="${escapeHtml(sec.title)}">
      <button class="btn btn-danger-ghost btn-sm" id="deleteSectionBtn">Удалить раздел</button>
    </div>
    <textarea class="body-editor" id="bodyEditor" placeholder="Обычный текст, **жирный**, строки с - для списка. LIFEHACK: ... QUOTE: ... VOCAB: слово | перевод | заметка"></textarea>
    <div class="editor-hint">Спецразметка: <b>LIFEHACK:</b> — синяя карточка-лайфхак · <b>QUOTE:</b> — карточка с примером текста · <b>VOCAB: fi | en | заметка</b> — карточки слов (несколько подряд объединяются в сетку)</div>
    <div class="exercises-wrap">
      <div class="exercises-heading">Упражнения (${(sec.exercises||[]).length})</div>
      <div id="exercisesList"></div>
      ${state.editingExerciseId === 'new' ? renderExerciseBuilder(null) : `<div class="add-exercise-card" id="addExerciseCard">+ Добавить упражнение</div>`}
    </div>
  `;
  const bodyEditor = document.getElementById('bodyEditor');
  bodyEditor.value = sec.body || '';
  document.getElementById('sectionTitleInput').addEventListener('input', (e) => { sec.title = e.target.value; renderSectionList(); renderCrumb(); saveCourse(); });
  bodyEditor.addEventListener('input', (e) => { sec.body = e.target.value; saveCourse(); });
  document.getElementById('deleteSectionBtn').addEventListener('click', () => deleteSection(sec.id));

  const exList = document.getElementById('exercisesList');
  exList.innerHTML = (sec.exercises || []).map(ex => renderExerciseEditCard(ex)).join('');
  (sec.exercises || []).forEach(ex => {
    const editBtn = document.querySelector(`[data-edit-ex="${ex.id}"]`);
    const delBtn = document.querySelector(`[data-del-ex="${ex.id}"]`);
    if (editBtn) editBtn.addEventListener('click', () => { state.editingExerciseId = ex.id; renderMain(); });
    if (delBtn) delBtn.addEventListener('click', () => { sec.exercises = sec.exercises.filter(e => e.id !== ex.id); saveCourse(); renderMain(); renderSectionList(); });
  });
  if (state.editingExerciseId && state.editingExerciseId !== 'new') {
    const ex = (sec.exercises || []).find(e => e.id === state.editingExerciseId);
    if (ex) { const c = document.createElement('div'); c.innerHTML = renderExerciseBuilder(ex); exList.appendChild(c.firstElementChild); }
  }
  const addCard = document.getElementById('addExerciseCard');
  if (addCard) addCard.addEventListener('click', () => { state.editingExerciseId = 'new'; renderMain(); });
  wireBuilderForm(sec);
}

const TYPE_LABELS = { mc: 'Multiple choice', tf: 'True / False / Not stated', open: 'Открытый вопрос', flash: 'Флеш-карты', match: 'Соедини пары', fill: 'Вставь слово' };
const TYPE_TAGCLASS = { mc: 'tag-mc', tf: 'tag-tf', open: 'tag-open', flash: 'tag-flash', match: 'tag-match', fill: 'tag-fill' };

function renderExerciseEditCard(ex) {
  if (state.editingExerciseId === ex.id) return '';
  let qText = ex.question || ex.statement || ex.text || '';
  if (ex.type === 'flash') qText = `${ex.cards.length} карточек: ${ex.cards.map(c=>c.front).join(', ')}`;
  if (ex.type === 'match') qText = `${ex.pairs.length} пар: ${ex.pairs.map(p=>p.left).join(', ')}`;
  return `
    <div class="exercise-card">
      <span class="exercise-type-tag ${TYPE_TAGCLASS[ex.type]}">${TYPE_LABELS[ex.type]}</span>
      <div class="exercise-q">${escapeHtml(qText)}</div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button class="btn btn-sm" data-edit-ex="${ex.id}">Редактировать</button>
        <button class="btn btn-sm btn-danger-ghost" data-del-ex="${ex.id}">Удалить</button>
      </div>
    </div>
  `;
}

function renderExerciseBuilder(ex) {
  const type = ex ? ex.type : 'mc';
  const options = ex && ex.options ? ex.options : [{text:'',correct:true},{text:'',correct:false}];
  const cards = ex && ex.cards ? ex.cards : [{front:'',back:''},{front:'',back:''}];
  const pairs = ex && ex.pairs ? ex.pairs : [{left:'',right:''},{left:'',right:''}];
  return `
    <div class="exercise-card" id="builderCard">
      <div class="builder-form">
        <label>Тип упражнения</label>
        <select id="builderType">
          <option value="mc" ${type==='mc'?'selected':''}>Multiple choice</option>
          <option value="tf" ${type==='tf'?'selected':''}>True / False / Not stated</option>
          <option value="open" ${type==='open'?'selected':''}>Открытый вопрос</option>
          <option value="flash" ${type==='flash'?'selected':''}>Флеш-карты (Quizlet-style)</option>
          <option value="match" ${type==='match'?'selected':''}>Соедини пары</option>
          <option value="fill" ${type==='fill'?'selected':''}>Вставь слово</option>
        </select>

        <div id="fld-mc" style="display:${type==='mc'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Вопрос</label>
          <input type="text" id="builderQuestion" value="${escapeHtml(ex?.question || '')}">
          <label>Варианты ответа (отметьте правильный)</label>
          <div id="optionsWrap">
            ${options.map((o,i) => `<div class="option-edit-row"><input type="radio" name="correctOpt" value="${i}" ${o.correct?'checked':''}><input type="text" data-opt-idx="${i}" value="${escapeHtml(o.text)}" placeholder="Вариант ${i+1}"></div>`).join('')}
          </div>
          <button class="btn btn-sm" id="addOptionBtn" type="button">+ Вариант</button>
        </div>

        <div id="fld-tf" style="display:${type==='tf'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Утверждение</label>
          <input type="text" id="builderStatement" value="${escapeHtml(ex?.statement || '')}">
          <label>Правильный ответ</label>
          <select id="builderTfAnswer">
            <option value="true" ${ex?.answer==='true'?'selected':''}>True</option>
            <option value="false" ${ex?.answer==='false'?'selected':''}>False</option>
            <option value="notstated" ${ex?.answer==='notstated'?'selected':''}>Not stated</option>
          </select>
        </div>

        <div id="fld-open" style="display:${type==='open'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Вопрос</label>
          <input type="text" id="builderOpenQuestion" value="${escapeHtml(ex?.question || '')}">
          <label>Ответ (для проверки)</label>
          <input type="text" id="builderOpenAnswer" value="${escapeHtml(ex?.answer || '')}">
        </div>

        <div id="fld-flash" style="display:${type==='flash'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Карточки (термин / перевод)</label>
          <div id="cardsWrap">
            ${cards.map((c,i) => `<div class="pair-edit-row"><input type="text" data-card-front="${i}" value="${escapeHtml(c.front)}" placeholder="Финский"><input type="text" data-card-back="${i}" value="${escapeHtml(c.back)}" placeholder="Перевод"></div>`).join('')}
          </div>
          <button class="btn btn-sm" id="addCardBtn" type="button">+ Карточка</button>
        </div>

        <div id="fld-match" style="display:${type==='match'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Пары для соединения</label>
          <div id="pairsWrap">
            ${pairs.map((p,i) => `<div class="pair-edit-row"><input type="text" data-pair-left="${i}" value="${escapeHtml(p.left)}" placeholder="Слово"><input type="text" data-pair-right="${i}" value="${escapeHtml(p.right)}" placeholder="Перевод"></div>`).join('')}
          </div>
          <button class="btn btn-sm" id="addPairBtn" type="button">+ Пара</button>
        </div>

        <div id="fld-fill" style="display:${type==='fill'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Предложение (пропуск отметьте как ___)</label>
          <input type="text" id="builderFillText" value="${escapeHtml(ex?.text || '')}">
          <label>Правильное слово</label>
          <input type="text" id="builderFillAnswer" value="${escapeHtml(ex?.answer || '')}">
        </div>

        <div style="display:flex; gap:8px; margin-top:6px;">
          <button class="btn btn-primary btn-sm" id="saveExerciseBtn">Сохранить</button>
          <button class="btn btn-sm" id="cancelExerciseBtn">Отмена</button>
        </div>
      </div>
    </div>
  `;
}

function wireBuilderForm(sec) {
  const typeSel = document.getElementById('builderType');
  if (!typeSel) return;
  const allFields = ['mc','tf','open','flash','match','fill'];
  typeSel.addEventListener('change', () => { allFields.forEach(t => document.getElementById(`fld-${t}`).style.display = (t === typeSel.value) ? 'flex' : 'none'); });

  const addOptBtn = document.getElementById('addOptionBtn');
  if (addOptBtn) addOptBtn.addEventListener('click', () => {
    const wrap = document.getElementById('optionsWrap'); const idx = wrap.children.length;
    const div = document.createElement('div'); div.className = 'option-edit-row';
    div.innerHTML = `<input type="radio" name="correctOpt" value="${idx}"><input type="text" data-opt-idx="${idx}" placeholder="Вариант ${idx+1}">`;
    wrap.appendChild(div);
  });
  const addCardBtn = document.getElementById('addCardBtn');
  if (addCardBtn) addCardBtn.addEventListener('click', () => {
    const wrap = document.getElementById('cardsWrap'); const idx = wrap.children.length;
    const div = document.createElement('div'); div.className = 'pair-edit-row';
    div.innerHTML = `<input type="text" data-card-front="${idx}" placeholder="Финский"><input type="text" data-card-back="${idx}" placeholder="Перевод">`;
    wrap.appendChild(div);
  });
  const addPairBtn = document.getElementById('addPairBtn');
  if (addPairBtn) addPairBtn.addEventListener('click', () => {
    const wrap = document.getElementById('pairsWrap'); const idx = wrap.children.length;
    const div = document.createElement('div'); div.className = 'pair-edit-row';
    div.innerHTML = `<input type="text" data-pair-left="${idx}" placeholder="Слово"><input type="text" data-pair-right="${idx}" placeholder="Перевод">`;
    wrap.appendChild(div);
  });

  document.getElementById('cancelExerciseBtn').addEventListener('click', () => { state.editingExerciseId = null; renderMain(); });

  document.getElementById('saveExerciseBtn').addEventListener('click', () => {
    const type = typeSel.value;
    const existingId = (state.editingExerciseId !== 'new') ? state.editingExerciseId : null;
    let newEx;
    if (type === 'mc') {
      const question = document.getElementById('builderQuestion').value.trim();
      const optionInputs = Array.from(document.querySelectorAll('#optionsWrap [data-opt-idx]'));
      const correctIdx = Number(document.querySelector('input[name="correctOpt"]:checked')?.value ?? 0);
      const opts = optionInputs.map((inp, i) => ({ text: inp.value.trim(), correct: i === correctIdx })).filter(o => o.text);
      if (!question || opts.length < 2) { alert('Заполните вопрос и минимум 2 варианта ответа'); return; }
      newEx = { id: existingId || uid(), type: 'mc', question, options: opts };
    } else if (type === 'tf') {
      const statement = document.getElementById('builderStatement').value.trim();
      const answer = document.getElementById('builderTfAnswer').value;
      if (!statement) { alert('Заполните утверждение'); return; }
      newEx = { id: existingId || uid(), type: 'tf', statement, answer };
    } else if (type === 'open') {
      const question = document.getElementById('builderOpenQuestion').value.trim();
      const answer = document.getElementById('builderOpenAnswer').value.trim();
      if (!question) { alert('Заполните вопрос'); return; }
      newEx = { id: existingId || uid(), type: 'open', question, answer };
    } else if (type === 'flash') {
      const fronts = Array.from(document.querySelectorAll('#cardsWrap [data-card-front]'));
      const backs = Array.from(document.querySelectorAll('#cardsWrap [data-card-back]'));
      const cards = fronts.map((inp, i) => ({ front: inp.value.trim(), back: backs[i].value.trim() })).filter(c => c.front && c.back);
      if (cards.length < 2) { alert('Добавьте минимум 2 карточки'); return; }
      newEx = { id: existingId || uid(), type: 'flash', cards };
    } else if (type === 'match') {
      const lefts = Array.from(document.querySelectorAll('#pairsWrap [data-pair-left]'));
      const rights = Array.from(document.querySelectorAll('#pairsWrap [data-pair-right]'));
      const pairs = lefts.map((inp, i) => ({ left: inp.value.trim(), right: rights[i].value.trim() })).filter(p => p.left && p.right);
      if (pairs.length < 2) { alert('Добавьте минимум 2 пары'); return; }
      newEx = { id: existingId || uid(), type: 'match', pairs };
    } else {
      const text = document.getElementById('builderFillText').value.trim();
      const answer = document.getElementById('builderFillAnswer').value.trim();
      if (!text || !text.includes('___')) { alert('В предложении должен быть пропуск ___'); return; }
      newEx = { id: existingId || uid(), type: 'fill', text, answer };
    }
    if (!sec.exercises) sec.exercises = [];
    if (existingId) { const i = sec.exercises.findIndex(e => e.id === existingId); sec.exercises[i] = newEx; } else { sec.exercises.push(newEx); }
    state.editingExerciseId = null;
    saveCourse(); renderMain(); renderSectionList();
  });
}

function renderStudyView(main, sec) {
  main.innerHTML = `
    <div class="content-header"><h2 class="section-title-view">${escapeHtml(sec.title)}</h2></div>
    ${renderBody(sec.body)}
    <div class="exercises-wrap">
      <div class="exercises-heading">Проверь себя</div>
      <div id="studyExercises"></div>
    </div>
  `;
  const wrap = document.getElementById('studyExercises');
  (sec.exercises || []).forEach(ex => { const card = document.createElement('div'); card.className = 'exercise-card'; card.appendChild(buildStudyExerciseNode(ex)); wrap.appendChild(card); });
  if (!(sec.exercises || []).length) wrap.innerHTML = '<p style="color:var(--ink-faint); font-size:13.5px;">В этом разделе пока нет упражнений.</p>';
}

function buildStudyExerciseNode(ex) {
  const container = document.createElement('div');
  const saved = progress[ex.id];

  if (ex.type === 'mc') {
    container.innerHTML = `<span class="exercise-type-tag ${TYPE_TAGCLASS.mc}">${TYPE_LABELS.mc}</span><div class="exercise-q">${escapeHtml(ex.question)}</div><div class="optsHolder"></div><div class="feedbackHolder"></div>`;
    const optsHolder = container.querySelector('.optsHolder');
    ex.options.forEach((opt, i) => {
      const row = document.createElement('div'); row.className = 'option-row'; row.textContent = opt.text;
      if (saved) { if (opt.correct) row.classList.add('correct-answer'); else if (saved.chosenIdx === i) row.classList.add('wrong-answer'); }
      row.addEventListener('click', () => {
        if (progress[ex.id]) return;
        const correct = !!opt.correct;
        progress[ex.id] = { status: correct ? 'correct' : 'incorrect', chosenIdx: i, at: Date.now() };
        saveProgress(); renderMain(); renderProgressRing(); renderSectionList();
      });
      optsHolder.appendChild(row);
    });
    if (saved) container.querySelector('.feedbackHolder').innerHTML = `<div class="feedback-box ${saved.status==='correct'?'feedback-correct':'feedback-wrong'}">${saved.status==='correct' ? 'Верно!' : 'Неверно — правильный вариант выделен зелёным.'}</div>`;
    return container;
  }

  if (ex.type === 'tf') {
    container.innerHTML = `<span class="exercise-type-tag ${TYPE_TAGCLASS.tf}">${TYPE_LABELS.tf}</span><div class="exercise-q">${escapeHtml(ex.statement)}</div><div class="optsHolder"></div><div class="feedbackHolder"></div>`;
    const optsHolder = container.querySelector('.optsHolder');
    const labels = { true: 'True', false: 'False', notstated: 'Not stated' };
    ['true','false','notstated'].forEach(val => {
      const row = document.createElement('div'); row.className = 'option-row'; row.textContent = labels[val];
      if (saved) { if (val === ex.answer) row.classList.add('correct-answer'); else if (saved.chosen === val) row.classList.add('wrong-answer'); }
      row.addEventListener('click', () => {
        if (progress[ex.id]) return;
        const correct = val === ex.answer;
        progress[ex.id] = { status: correct ? 'correct' : 'incorrect', chosen: val, at: Date.now() };
        saveProgress(); renderMain(); renderProgressRing(); renderSectionList();
      });
      optsHolder.appendChild(row);
    });
    if (saved) container.querySelector('.feedbackHolder').innerHTML = `<div class="feedback-box ${saved.status==='correct'?'feedback-correct':'feedback-wrong'}">${saved.status==='correct' ? 'Верно!' : 'Неверно — правильный вариант выделен зелёным.'}</div>`;
    return container;
  }

  if (ex.type === 'open') {
    container.innerHTML = `
      <span class="exercise-type-tag ${TYPE_TAGCLASS.open}">${TYPE_LABELS.open}</span>
      <div class="exercise-q">${escapeHtml(ex.question)}</div>
      <textarea class="body-editor" style="min-height:70px;" id="open-${ex.id}" ${saved?'disabled':''}>${saved ? escapeHtml(saved.answerText||'') : ''}</textarea>
      <div style="margin-top:10px; display:flex; gap:8px;">${saved ? '' : `<button class="btn btn-primary btn-sm" id="submit-${ex.id}">Показать ответ</button>`}</div>
      <div class="feedbackHolder"></div>
    `;
    const fb = container.querySelector('.feedbackHolder');
    if (saved) fb.innerHTML = `<div class="feedback-box feedback-correct">Ответ для сверки: ${escapeHtml(ex.answer || '—')}</div>`;
    else setTimeout(() => {
      const btn = container.querySelector(`#submit-${ex.id}`);
      if (btn) btn.addEventListener('click', () => {
        const text = container.querySelector(`#open-${ex.id}`).value;
        progress[ex.id] = { status: 'correct', answerText: text, at: Date.now() };
        saveProgress(); renderMain(); renderProgressRing(); renderSectionList();
      });
    }, 0);
    return container;
  }

  if (ex.type === 'fill') {
    const parts = ex.text.split('___');
    container.innerHTML = `
      <span class="exercise-type-tag ${TYPE_TAGCLASS.fill}">${TYPE_LABELS.fill}</span>
      <div class="fill-sentence">${escapeHtml(parts[0])}<input type="text" class="fill-input" id="fillInput-${ex.id}" ${saved?'disabled':''} value="${saved ? escapeHtml(saved.value||'') : ''}">${escapeHtml(parts[1]||'')}</div>
      ${saved ? '' : `<button class="btn btn-primary btn-sm" id="checkFill-${ex.id}">Проверить</button>`}
      <div class="feedbackHolder"></div>
    `;
    const fb = container.querySelector('.feedbackHolder');
    if (saved) fb.innerHTML = `<div class="feedback-box ${saved.status==='correct'?'feedback-correct':'feedback-wrong'}">${saved.status==='correct' ? 'Верно!' : `Неверно — правильный ответ: ${escapeHtml(ex.answer)}`}</div>`;
    else setTimeout(() => {
      const btn = container.querySelector(`#checkFill-${ex.id}`);
      if (btn) btn.addEventListener('click', () => {
        const val = container.querySelector(`#fillInput-${ex.id}`).value.trim();
        const correct = val.toLowerCase() === ex.answer.trim().toLowerCase();
        progress[ex.id] = { status: correct ? 'correct' : 'incorrect', value: val, at: Date.now() };
        saveProgress(); renderMain(); renderProgressRing(); renderSectionList();
      });
    }, 0);
    return container;
  }

  if (ex.type === 'flash') {
    if (!ephemeral[ex.id]) ephemeral[ex.id] = { idx: 0, flipped: false };
    const es = ephemeral[ex.id];
    container.innerHTML = `
      <span class="exercise-type-tag ${TYPE_TAGCLASS.flash}">${TYPE_LABELS.flash}</span>
      <div class="flash-wrap">
        <div class="flash-card" id="flashCard-${ex.id}">
          <div class="flash-inner">
            <div class="flash-face flash-front" id="flashFront-${ex.id}"></div>
            <div class="flash-face flash-back" id="flashBack-${ex.id}"></div>
          </div>
        </div>
        <div class="flash-controls">
          <button class="btn btn-sm" id="flashPrev-${ex.id}">← Назад</button>
          <span class="flash-counter" id="flashCounter-${ex.id}"></span>
          <button class="btn btn-sm" id="flashNext-${ex.id}">Вперёд →</button>
        </div>
      </div>
    `;
    function updateFlash() {
      const card = ex.cards[es.idx];
      container.querySelector(`#flashFront-${ex.id}`).textContent = card.front;
      container.querySelector(`#flashBack-${ex.id}`).textContent = card.back;
      container.querySelector(`#flashCounter-${ex.id}`).textContent = `${es.idx+1} / ${ex.cards.length}`;
      container.querySelector(`#flashCard-${ex.id}`).classList.toggle('flipped', es.flipped);
    }
    updateFlash();
    container.querySelector(`#flashCard-${ex.id}`).addEventListener('click', () => { es.flipped = !es.flipped; updateFlash(); });
    container.querySelector(`#flashPrev-${ex.id}`).addEventListener('click', () => { es.idx = (es.idx - 1 + ex.cards.length) % ex.cards.length; es.flipped = false; updateFlash(); });
    container.querySelector(`#flashNext-${ex.id}`).addEventListener('click', () => {
      es.idx = (es.idx + 1) % ex.cards.length; es.flipped = false; updateFlash();
      if (!progress[ex.id]) { progress[ex.id] = { status: 'correct', at: Date.now() }; saveProgress(); renderProgressRing(); renderSectionList(); }
    });
    return container;
  }

  if (ex.type === 'match') {
    if (!ephemeral[ex.id]) { const rightShuffled = [...ex.pairs].sort(() => Math.random() - 0.5); ephemeral[ex.id] = { selectedLeft: null, matched: new Set(), rightOrder: rightShuffled }; }
    const es = ephemeral[ex.id];
    const isComplete = saved && saved.status === 'complete';
    container.innerHTML = `
      <span class="exercise-type-tag ${TYPE_TAGCLASS.match}">${TYPE_LABELS.match}</span>
      <div class="exercise-q">Кликните слово слева, затем перевод справа</div>
      <div class="match-grid"><div class="match-col" id="matchLeft-${ex.id}"></div><div class="match-col" id="matchRight-${ex.id}"></div></div>
      <div class="feedbackHolder"></div>
    `;
    const leftCol = container.querySelector(`#matchLeft-${ex.id}`);
    const rightCol = container.querySelector(`#matchRight-${ex.id}`);
    ex.pairs.forEach((p) => {
      const item = document.createElement('div'); item.className = 'match-item'; item.textContent = p.left;
      if (isComplete || es.matched.has(p.left)) item.classList.add('matched');
      item.addEventListener('click', () => { if (isComplete || es.matched.has(p.left)) return; es.selectedLeft = p.left; renderMain(); });
      if (es.selectedLeft === p.left) item.classList.add('selected');
      leftCol.appendChild(item);
    });
    es.rightOrder.forEach((p) => {
      const item = document.createElement('div'); item.className = 'match-item'; item.textContent = p.right;
      if (isComplete || es.matched.has(p.left)) item.classList.add('matched');
      item.addEventListener('click', () => {
        if (isComplete || es.matched.has(p.left) || !es.selectedLeft) return;
        if (es.selectedLeft === p.left) {
          es.matched.add(p.left); es.selectedLeft = null;
          if (es.matched.size === ex.pairs.length) { progress[ex.id] = { status: 'complete', at: Date.now() }; saveProgress(); renderProgressRing(); renderSectionList(); }
          renderMain();
        } else { item.classList.add('wrong-flash'); setTimeout(() => { es.selectedLeft = null; renderMain(); }, 500); }
      });
      rightCol.appendChild(item);
    });
    if (es.matched.size === ex.pairs.length || isComplete) container.querySelector('.feedbackHolder').innerHTML = `<div class="feedback-box feedback-correct">Все пары собраны верно!</div>`;
    return container;
  }
  return container;
}

function deleteSection(id) {
  const l = getLesson();
  if (!l || l.sections.length <= 1) { alert('Нельзя удалить последний раздел урока'); return; }
  if (!confirm('Удалить этот раздел?')) return;
  l.sections = l.sections.filter(s => s.id !== id);
  if (state.sectionId === id) state.sectionId = l.sections[0].id;
  saveCourse(); renderAll();
}
function addSection() {
  const l = getLesson(); if (!l) return;
  const newSec = { id: uid(), title: `Section ${l.sections.length + 1} — Новый раздел`, body: '', exercises: [] };
  l.sections.push(newSec); state.sectionId = newSec.id; state.showHomework = false;
  saveCourse(); renderAll();
}
function moveSectionUp(id) {
  const l = getLesson(); const idx = l.sections.findIndex(s => s.id === id);
  if (idx <= 0) return;
  [l.sections[idx-1], l.sections[idx]] = [l.sections[idx], l.sections[idx-1]];
  saveCourse(); renderSectionList();
}

function wireStaticEvents() {
  document.getElementById('modeEditBtn').addEventListener('click', () => {
    state.mode = 'edit'; document.getElementById('modeEditBtn').classList.add('active'); document.getElementById('modeStudyBtn').classList.remove('active'); renderMain();
  });
  document.getElementById('modeStudyBtn').addEventListener('click', () => {
    state.mode = 'study'; document.getElementById('modeStudyBtn').classList.add('active'); document.getElementById('modeEditBtn').classList.remove('active'); renderMain();
  });
  document.getElementById('moduleSelect').addEventListener('change', (e) => {
    state.moduleId = e.target.value; const m = getModule();
    state.lessonId = m.lessons[0]?.id || null; const l = getLesson();
    state.sectionId = l?.sections[0]?.id || null; state.showHomework = false;
    renderAll();
  });
  document.getElementById('lessonSelect').addEventListener('change', (e) => {
    state.lessonId = e.target.value; const l = getLesson();
    state.sectionId = l?.sections[0]?.id || null; state.showHomework = false;
    renderAll();
  });
  document.getElementById('addSectionBtn').addEventListener('click', addSection);
  document.getElementById('homeworkPin').addEventListener('click', () => { state.showHomework = true; renderSectionList(); renderMain(); });
  document.getElementById('sectionList').addEventListener('click', (e) => {
    const target = e.target; const action = target.getAttribute('data-action'); const id = target.getAttribute('data-id');
    if (!action) return;
    if (action === 'select') { state.sectionId = id; state.showHomework = false; state.editingExerciseId = null; renderSectionList(); renderMain(); }
    else if (action === 'up') moveSectionUp(id);
    else if (action === 'delete') deleteSection(id);
  });
}

(async function init() { await loadState(); wireStaticEvents(); renderAll(); })();
</script>
