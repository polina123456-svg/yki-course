<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hei Study — course builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Fraunces:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #01184E; --navy-2: #0B2A6B; --navy-soft: #EAF0FC; --bg: #F3F6FB;
    --ink: #101A33; --ink-soft: #5A6478; --ink-faint: #97A0B3; --card: #FFFFFF;
    --border: #E4E8F2; --border-strong: #CBD3E6; --gold: #E8A33D; --gold-soft: #FBF0DC;
    --teal: #2EA8A0; --teal-soft: #E2F5F3; --coral: #E0654F; --coral-soft: #FBEAE6;
    --success: #2F9E58; --success-soft: #E6F5EA; --danger: #D6503F; --danger-soft: #FBE9E6;
    --radius: 12px; --radius-lg: 18px; --font-ui: 'Manrope', sans-serif; --font-read: 'Fraunces', serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-ui); -webkit-font-smoothing: antialiased; }
  #app { min-height: 100vh; display: flex; flex-direction: column; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; background: var(--navy); color: #fff; gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand-mark { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg, var(--gold), var(--coral)); display: flex; align-items: center; justify-content: center; font-family: var(--font-read); font-weight: 600; font-size: 16px; color: var(--navy); flex-shrink: 0; }
  .brand-text { font-size: 16px; font-weight: 700; letter-spacing: 0.2px; }
  .brand-sub { font-size: 12px; color: #9FB0DE; margin-top: 1px; }

  .mode-toggle { display: flex; background: rgba(255,255,255,0.1); border-radius: 999px; padding: 4px; }
  .mode-toggle button { border: none; background: transparent; color: #C6D1EE; font-family: var(--font-ui); font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 999px; cursor: pointer; transition: all .15s; }
  .mode-toggle button.active { background: var(--gold); color: var(--navy); }

  .layout { display: flex; flex: 1; min-height: 0; }

  .sidebar { width: 310px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
  .picker-group { margin-bottom: 16px; }
  .picker-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--ink-faint); margin-bottom: 6px; font-weight: 700; }
  select { width: 100%; padding: 10px 11px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: #fff; font-family: var(--font-ui); font-size: 14px; color: var(--ink); cursor: pointer; font-weight: 500; }

  .section-divider { height: 1px; background: var(--border); margin: 16px 0; }

  .progress-ring-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 12px 14px; background: var(--navy); border-radius: var(--radius-lg); }
  .progress-ring { flex-shrink: 0; }
  .progress-text { font-size: 12px; color: #B9C7F0; line-height: 1.4; }
  .progress-text b { font-family: var(--font-read); font-size: 18px; color: #fff; }

  .module-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding: 10px 12px; background: var(--teal-soft); border-radius: 10px; font-size: 12px; color: #0E5C56; font-weight: 600; }

  .section-item { display: flex; align-items: center; gap: 10px; padding: 11px 11px; border-radius: 10px; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; position: relative; }
  .section-item:hover { background: #F7F9FD; }
  .section-item.active { background: var(--navy-soft); border-color: var(--navy-2); }
  .step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--border); color: var(--ink-soft); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .section-item.active .step-num { background: var(--navy); color: #fff; }
  .section-item.done .step-num { background: var(--success); color: #fff; }
  .section-item .handle { color: var(--ink-faint); font-size: 12px; cursor: grab; }
  .section-item .title { flex: 1; font-size: 13.5px; color: var(--ink); line-height: 1.35; font-weight: 500; }
  .section-item .menu-dots { color: var(--ink-faint); font-size: 14px; padding: 2px 4px; border-radius: 4px; }
  .section-item .menu-dots:hover { background: var(--border); }

  .add-section-btn { width: 100%; padding: 11px; border: 1.5px dashed var(--border-strong); background: transparent; border-radius: 10px; color: var(--ink-soft); font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .add-section-btn:hover { background: var(--navy-soft); border-color: var(--navy-2); color: var(--navy); }

  .homework-pin { margin-top: 18px; padding: 12px 14px; border-radius: 10px; background: var(--gold-soft); color: #8A5F16; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .homework-pin.active { outline: 2px solid var(--gold); }

  .content { flex: 1; overflow-y: auto; padding: 34px 44px; max-width: 940px; }
  .content-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
  .section-title-input { font-family: var(--font-read); font-size: 28px; font-weight: 600; border: none; background: transparent; width: 100%; color: var(--navy); padding: 4px 0; border-bottom: 2px solid transparent; }
  .section-title-input:focus { outline: none; border-bottom-color: var(--navy); }
  .section-title-view { font-family: var(--font-read); font-size: 28px; font-weight: 600; margin: 0 0 6px; color: var(--navy); }

  .body-editor { width: 100%; min-height: 220px; font-family: var(--font-ui); font-size: 14px; line-height: 1.7; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 14px; resize: vertical; color: var(--ink); }
  .editor-hint { font-size: 11.5px; color: var(--ink-faint); margin: 6px 0 14px; line-height: 1.5; }

  .content-cards { display: flex; flex-direction: column; gap: 14px; }
  .content-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
  .content-card p { margin: 0 0 12px; font-family: var(--font-ui); font-size: 15px; line-height: 1.7; color: var(--ink); }
  .content-card p:last-child { margin-bottom: 0; }
  .content-card strong { font-weight: 700; color: var(--navy); }
  .content-card ul { margin: 0; padding-left: 20px; }
  .content-card li { margin-bottom: 6px; font-size: 15px; line-height: 1.6; }

  .lifehack-card { background: var(--navy); border-radius: var(--radius-lg); padding: 16px 20px; color: #fff; display: flex; gap: 12px; align-items: flex-start; }
  .lifehack-card .badge { background: var(--gold); color: var(--navy); font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 6px; flex-shrink: 0; margin-top: 2px; }
  .lifehack-card .text { font-size: 14px; line-height: 1.6; color: #DCE4F7; }

  .quote-card { background: var(--teal-soft); border-radius: var(--radius-lg); padding: 16px 20px; border-left: 4px solid var(--teal); }
  .quote-card .quote-text { font-family: var(--font-read); font-style: italic; font-size: 16px; line-height: 1.7; color: #0E5C56; }

  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .vocab-chip { perspective: 900px; cursor: pointer; min-height: 84px; }
  .vocab-chip-inner { position: relative; width: 100%; height: 100%; min-height: 84px; transition: transform .45s cubic-bezier(.2,.8,.2,1); transform-style: preserve-3d; }
  .vocab-chip.flipped .vocab-chip-inner { transform: rotateY(180deg); }
  .vocab-face { position: absolute; inset: 0; backface-visibility: hidden; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: center; }
  .vocab-face:hover { border-color: var(--navy); }
  .vocab-back { transform: rotateY(180deg); background: var(--navy-soft); }
  .vocab-chip .fi { font-weight: 700; color: var(--navy); font-size: 15px; }
  .vocab-chip .flip-hint { font-size: 10px; color: var(--ink-faint); margin-top: 4px; }
  .vocab-chip .en { font-size: 13.5px; color: var(--ink); font-weight: 600; }
  .vocab-chip .note { font-size: 11.5px; color: var(--teal); margin-top: 4px; font-weight: 600; }

  .exercises-wrap { margin-top: 28px; }
  .exercises-heading { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-faint); font-weight: 700; margin-bottom: 10px; }

  .exercise-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 12px; }
  .exercise-type-tag { display: inline-block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 500; padding: 3px 8px; border-radius: 5px; margin-bottom: 8px; }
  .tag-mc { background: var(--navy-soft); color: var(--navy); }
  .tag-tf { background: var(--teal-soft); color: #0E5C56; }
  .tag-open { background: var(--gold-soft); color: #8A5F16; }
  .tag-flash { background: var(--coral-soft); color: var(--coral); }
  .tag-match { background: #EAE2FB; color: #5B3FA0; }
  .tag-fill { background: var(--success-soft); color: var(--success); }
  .tag-order { background: #DCEBFF; color: #1257B0; }
  .tag-diag { background: #FCE4EC; color: #AD1457; }
  .diag-progress { display: flex; gap: 6px; margin-bottom: 14px; }
  .diag-dot { flex: 1; height: 5px; border-radius: 3px; background: var(--border); }
  .diag-dot.filled { background: var(--navy); }
  .diag-result-card { border-radius: var(--radius-lg); padding: 20px 22px; text-align: center; }
  .diag-great { background: var(--success-soft); }
  .diag-ontrack { background: var(--gold-soft); }
  .diag-fix { background: var(--coral-soft); }
  .diag-result-title { font-family: var(--font-read); font-size: 20px; font-weight: 600; margin-bottom: 8px; }

  .exercise-q { font-size: 15px; font-weight: 500; margin-bottom: 10px; line-height: 1.5; }
  .option-row { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: 8px; margin-bottom: 7px; cursor: pointer; font-size: 14px; transition: all .12s; }
  .option-row:hover { border-color: var(--navy); background: var(--navy-soft); }
  .option-row.correct-answer { border-color: var(--success); background: var(--success-soft); }
  .option-row.wrong-answer { border-color: var(--danger); background: var(--danger-soft); }

  .btn { font-family: var(--font-ui); font-size: 13.5px; font-weight: 500; padding: 9px 16px; border-radius: 8px; border: 1px solid var(--border-strong); background: #fff; color: var(--ink); cursor: pointer; }
  .btn:hover { background: #F8FAFB; }
  .btn-primary { background: var(--navy); border-color: var(--navy); color: #fff; }
  .btn-primary:hover { background: var(--navy-2); }
  .btn-gold { background: var(--gold); border-color: var(--gold); color: var(--navy); }
  .btn-danger-ghost { color: var(--danger); border-color: var(--danger-soft); }
  .btn-sm { padding: 5px 10px; font-size: 12.5px; }

  .feedback-box { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13.5px; }
  .feedback-correct { background: var(--success-soft); color: var(--success); }
  .feedback-wrong { background: var(--danger-soft); color: var(--danger); }

  .add-exercise-card { border: 1px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 14px 18px; text-align: center; color: var(--ink-soft); cursor: pointer; font-size: 13.5px; }
  .add-exercise-card:hover { border-color: var(--navy); background: var(--navy-soft); color: var(--navy); }

  .builder-form { display: flex; flex-direction: column; gap: 10px; }
  .builder-form label { font-size: 12px; color: var(--ink-faint); font-weight: 500; }
  .builder-form input[type="text"], .builder-form textarea, .builder-form select { width: 100%; padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: 7px; font-family: var(--font-ui); font-size: 13.5px; }
  .option-edit-row, .pair-edit-row { display: flex; align-items: center; gap: 8px; }
  .option-edit-row input[type="text"], .pair-edit-row input[type="text"] { flex: 1; }

  .flash-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .flash-stack { position: relative; width: 100%; max-width: 380px; height: 220px; touch-action: none; }
  .flash-card { position: absolute; inset: 0; border-radius: var(--radius-lg); cursor: grab; display: flex; align-items: center; justify-content: center; padding: 22px; text-align: center; font-family: var(--font-read); font-size: 22px; font-weight: 500; user-select: none; box-shadow: 0 8px 22px rgba(1,24,78,0.12); transition: transform .35s cubic-bezier(.2,.8,.2,1), opacity .35s; background: var(--navy); color: #fff; }
  .flash-card.behind { z-index: 0; transform: scale(0.94) translateY(10px); opacity: 0.6; box-shadow: none; }
  .flash-card.top { z-index: 1; }
  .flash-card.flipped { background: var(--gold-soft); color: #8A5F16; }
  .flash-card.dragging { cursor: grabbing; transition: none; }
  .flash-card .swipe-label { position: absolute; top: 14px; font-family: var(--font-ui); font-size: 12px; font-weight: 700; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 6px; opacity: 0; transition: opacity .1s; }
  .swipe-label.know { right: 14px; background: var(--success); color: #fff; }
  .swipe-label.dontknow { left: 14px; background: var(--danger); color: #fff; }

  .flash-actions { display: flex; align-items: center; gap: 20px; }
  .flash-round-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border-strong); background: #fff; display: flex; align-items: center; justify-content: center; font-size: 19px; cursor: pointer; transition: all .15s; }
  .flash-round-btn:hover { transform: scale(1.06); }
  .flash-round-btn.dontknow:hover { border-color: var(--danger); color: var(--danger); }
  .flash-round-btn.know:hover { border-color: var(--success); color: var(--success); }
  .flash-counter { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .flash-hint { font-size: 11.5px; color: var(--ink-faint); text-align: center; }

  .flash-summary { text-align: center; padding: 16px; }
  .flash-summary-stats { display: flex; gap: 14px; justify-content: center; margin: 14px 0; }
  .stat-pill { padding: 9px 16px; border-radius: 10px; font-weight: 700; font-size: 14px; }
  .stat-know { background: var(--success-soft); color: var(--success); }
  .stat-dontknow { background: var(--danger-soft); color: var(--danger); }
  .export-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }

  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .match-col { display: flex; flex-direction: column; gap: 8px; }
  .match-item { padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border-strong); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .12s; }
  .match-item:hover { border-color: var(--navy); }
  .match-item.selected { border-color: var(--navy); background: var(--navy-soft); }
  .match-item.matched { border-color: var(--success); background: var(--success-soft); color: var(--success); cursor: default; }
  .match-item.wrong-flash { border-color: var(--danger); background: var(--danger-soft); }

  .fill-sentence { font-size: 16px; line-height: 1.8; margin-bottom: 12px; }
  .fill-input { width: 140px; border: none; border-bottom: 2px solid var(--navy); background: var(--navy-soft); font-family: var(--font-ui); font-size: 15px; padding: 4px 8px; text-align: center; border-radius: 6px 6px 0 0; }

  .order-tokens { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; min-height: 40px; padding: 10px; border: 1px dashed var(--border-strong); border-radius: 10px; }
  .order-token { padding: 8px 14px; border-radius: 8px; background: var(--navy-soft); color: var(--navy); font-weight: 600; font-size: 13.5px; cursor: pointer; transition: all .12s; }
  .order-token:hover { transform: translateY(-1px); }
  .order-token.used { opacity: 0.35; cursor: default; background: var(--border); color: var(--ink-faint); }
  .order-answer { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; padding: 10px; border-radius: 10px; background: #fff; border: 1px solid var(--border-strong); margin-bottom: 10px; }
  .order-answer .order-token { background: var(--gold-soft); color: #8A5F16; }

  .audio-answer-toggle { display: flex; gap: 8px; margin-bottom: 10px; }
  .audio-answer-toggle button.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .recorder-box { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .rec-dot.live { animation: pulse 1s infinite; }
  .rec-timer { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .audio-note { font-size: 11.5px; color: var(--ink-faint); margin-top: 6px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-faint); }

  @media (max-width: 780px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .content { padding: 20px; }
    .match-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">Y</div>
      <div>
        <div class="brand-text">Hei Study</div>
        <div class="brand-sub" id="lessonCrumb">Module 1 · Lesson 1.1</div>
      </div>
    </div>
    <div class="mode-toggle">
      <button id="modeEditBtn" class="active">Editor</button>
      <button id="modeStudyBtn">Study mode</button>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div class="picker-group">
        <div class="picker-label">Module</div>
        <select id="moduleSelect"></select>
      </div>
      <div class="picker-group">
        <div class="picker-label">Lesson</div>
        <select id="lessonSelect"></select>
      </div>

      <div class="module-progress" id="moduleProgressBar"></div>
      <div class="progress-ring-wrap" id="progressRingWrap"></div>

      <div class="section-divider"></div>
      <div class="picker-label">Sections</div>
      <div id="sectionList" style="margin-top: 8px;"></div>
      <button class="add-section-btn" id="addSectionBtn">+ Add section</button>

      <div class="homework-pin" id="homeworkPin">📌 For homework</div>
    </aside>
    <main class="content" id="mainContent"></main>
  </div>
</div>

<script>
function uid() { return 'id-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function inlineFormat(s) { s = escapeHtml(s); return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); }

function renderBody(raw) {
  if (!raw) return '<div class="content-cards"><div class="content-card"><p style="color:var(--ink-faint)">Nothing here yet. Switch to Editor to add text.</p></div></div>';
  const lines = raw.split('\n');
  let blocks = []; let buffer = []; let vocabBuffer = [];
  function flushParagraphBuffer() { if (buffer.length) { blocks.push({ type: 'paragraphs', lines: buffer }); buffer = []; } }
  function flushVocab() { if (vocabBuffer.length) { blocks.push({ type: 'vocab', items: vocabBuffer }); vocabBuffer = []; } }
  for (let line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith('LIFEHACK:')) { flushParagraphBuffer(); flushVocab(); blocks.push({ type: 'lifehack', text: trimmed.slice(9).trim() }); continue; }
    if (trimmed.startsWith('QUOTE:')) { flushParagraphBuffer(); flushVocab(); blocks.push({ type: 'quote', text: trimmed.slice(6).trim() }); continue; }
    if (trimmed.startsWith('VOCAB:')) { flushParagraphBuffer(); const parts = trimmed.slice(6).split('|').map(s => s.trim()); vocabBuffer.push({ fi: parts[0] || '', en: parts[1] || '', note: parts[2] || '' }); continue; }
    flushVocab();
    if (trimmed === '') continue;
    buffer.push(trimmed);
  }
  flushParagraphBuffer(); flushVocab();

  let html = '<div class="content-cards">';
  for (const block of blocks) {
    if (block.type === 'lifehack') html += `<div class="lifehack-card"><span class="badge">Lifehack</span><span class="text">${inlineFormat(block.text)}</span></div>`;
    else if (block.type === 'quote') html += `<div class="quote-card"><div class="quote-text">"${inlineFormat(block.text)}"</div></div>`;
    else if (block.type === 'vocab') html += `<div class="content-card"><div class="vocab-grid">${block.items.map(v => `
      <div class="vocab-chip" onclick="this.classList.toggle('flipped')">
        <div class="vocab-chip-inner">
          <div class="vocab-face vocab-front"><div class="fi">${escapeHtml(v.fi)}</div><div class="flip-hint">tap to flip ↻</div></div>
          <div class="vocab-face vocab-back"><div class="en">${escapeHtml(v.en)}</div>${v.note ? `<div class="note">${escapeHtml(v.note)}</div>` : ''}</div>
        </div>
      </div>`).join('')}</div></div>`;
    else if (block.type === 'paragraphs') {
      let inner = ''; let inList = false;
      for (const l of block.lines) {
        if (l.startsWith('- ')) { if (!inList) { inner += '<ul>'; inList = true; } inner += `<li>${inlineFormat(l.slice(2))}</li>`; }
        else { if (inList) { inner += '</ul>'; inList = false; } inner += `<p>${inlineFormat(l)}</p>`; }
      }
      if (inList) inner += '</ul>';
      html += `<div class="content-card">${inner}</div>`;
    }

              tf('Remontti on kestänyt yli kaksi kuukautta.', 'true', '"Jo kolmatta kuukautta" (already into the third month) means more than two months have passed.'),

              tf('Remontin äänet ovat kuuluneet sallittujen kellonaikojen ulkopuolella.', 'false', 'The text says the noise has stayed within the building\u2019s allowed hours — the opposite of the statement.'),

              tf('Naapuri remontoi asunnon keittiötä.', 'notstated', 'The text never specifies which room is being renovated.')
            ])
        ];

        const allBankSections = bankSections.concat(workedDrills);

        function pickType(sections, type) {
          return sections.map(s => ({ id: uid(), title: s.title, body: s.body, exercises: (s.exercises || []).filter(e => e.type === type) })).filter(s => s.exercises.length > 0);
        }
        const oikeinVaarinSections = pickType(allBankSections, 'tf');
        const monivalintaSections = pickType(allBankSections, 'mc');
        const avoimetSections = pickType(allBankSections, 'open');

        return [
          l11,
          { id: uid(), title: 'Lesson 1.2 — Reading Strategies & Techniques', homework: [l12, l13, l14].map(l => l.homework).join('\n\n'), sections: [...l12.sections, ...l13.sections, ...l14.sections] },
          { id: uid(), title: 'Lesson 1.3a — Oikein vai väärin (Reading Bank)', homework: 'Read each text and decide if the statements are true (Oikein), false (Väärin), or not stated (Ei mainita). Check the explanation after each answer — it points to the exact word or phrase that decides the answer.', sections: oikeinVaarinSections },
          { id: uid(), title: 'Lesson 1.3b — Monivalinta (Reading Bank)', homework: 'Read each text and choose the correct answer from three options (A, B, C). Remember: the correct option is usually a paraphrase of the text, not an identical copy of its wording.', sections: monivalintaSections },
          { id: uid(), title: 'Lesson 1.3c — Avoimet kysymykset (Reading Bank)', homework: 'Read each text and answer the open question in your own words — brief but grammatically clear. Copying whole sentences from the text is not a strong answer.', sections: avoimetSections },
          { id: uid(), title: 'Lesson 1.4 — Listening Task Types (Bank)', homework: [l16, l17, l18].map(l => l.homework).join('\n\n'), sections: [...l16.sections, ...l17.sections, ...l18.sections] },
          { ...l19, title: 'Lesson 1.5 — First vs. Second Listen Strategy' },
          { id: uid(), title: 'Lesson 1.6 — Reading & Listening Mock Test + Module Wrap-up', homework: [l15, l110].map(l => l.homework).join('\n\n'), sections: [...l15.sections, ...l110.sections] }
        ];
      })()
    }]

}

let course = null;
let progress = {};
let state = { moduleId: null, lessonId: null, sectionId: null, mode: 'edit', showHomework: false, editingExerciseId: null };
let ephemeral = {};

async function loadState() {
  try { const c = await window.storage.get('yki_course', false); course = c ? JSON.parse(c.value) : seedCourse(); } catch (e) { course = seedCourse(); }
  try { const p = await window.storage.get('yki_progress', false); progress = p ? JSON.parse(p.value) : {}; } catch (e) { progress = {}; }
  state.moduleId = course.modules[0]?.id || null;
  state.lessonId = course.modules[0]?.lessons[0]?.id || null;
  state.sectionId = course.modules[0]?.lessons[0]?.sections[0]?.id || null;
}
async function saveCourse() { try { await window.storage.set('yki_course', JSON.stringify(course), false); } catch (e) { console.error(e); } }
async function saveProgress() { try { await window.storage.set('yki_progress', JSON.stringify(progress), false); } catch (e) { console.error(e); } }

function getModule() { return course.modules.find(m => m.id === state.moduleId); }
function getLesson() { const m = getModule(); return m ? m.lessons.find(l => l.id === state.lessonId) : null; }
function getSection() { const l = getLesson(); return l ? l.sections.find(s => s.id === state.sectionId) : null; }

function exerciseIsDone(ex) {
  const p = progress[ex.id]; if (!p) return false;
  if (ex.type === 'match') return p.status === 'complete';
  if (ex.type === 'flash') return p.status === 'complete';
  if (ex.type === 'diagnostic') return p.status === 'complete';
  return true;
}
function lessonProgressStats(lesson) {
  let total = 0, done = 0;
  for (const sec of lesson.sections) for (const ex of (sec.exercises || [])) { total++; if (exerciseIsDone(ex)) done++; }
  return { total, done };
}
function moduleProgressStats(mod) {
  let total = 0, done = 0;
  for (const lesson of mod.lessons) { const s = lessonProgressStats(lesson); total += s.total; done += s.done; }
  return { total, done };
}
function sectionAllDone(sec) { const exs = sec.exercises || []; return exs.length > 0 && exs.every(ex => exerciseIsDone(ex)); }

function renderAll() { renderTopPickers(); renderProgressRing(); renderModuleProgress(); renderSectionList(); renderMain(); renderCrumb(); }
function renderCrumb() { const m = getModule(), l = getLesson(); document.getElementById('lessonCrumb').textContent = `${m ? m.title : ''} · ${l ? l.title : ''}`; }
function renderTopPickers() {
  const modSel = document.getElementById('moduleSelect');
  modSel.innerHTML = course.modules.map(m => `<option value="${m.id}" ${m.id===state.moduleId?'selected':''}>${escapeHtml(m.title)}</option>`).join('');
  const m = getModule();
  const lesSel = document.getElementById('lessonSelect');
  lesSel.innerHTML = m ? m.lessons.map(l => `<option value="${l.id}" ${l.id===state.lessonId?'selected':''}>${escapeHtml(l.title)}</option>`).join('') : '';
}
function renderModuleProgress() {
  const m = getModule(); const el = document.getElementById('moduleProgressBar');
  if (!m) { el.innerHTML = ''; return; }
  const { total, done } = moduleProgressStats(m);
  const pct = total ? Math.round((done/total)*100) : 0;
  el.innerHTML = `📚 Module total: ${done}/${total} exercises (${pct}%)`;
}
function renderProgressRing() {
  const l = getLesson(); const wrap = document.getElementById('progressRingWrap');
  if (!l) { wrap.innerHTML = ''; return; }
  const { total, done } = lessonProgressStats(l);
  const pct = total ? Math.round((done/total)*100) : 0;
  const r = 19, circ = 2 * Math.PI * r; const offset = circ - (pct/100)*circ;
  wrap.innerHTML = `
    <svg class="progress-ring" width="46" height="46" viewBox="0 0 46 46">
      <circle cx="23" cy="23" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="5"/>
      <circle cx="23" cy="23" r="${r}" fill="none" stroke="#E8A33D" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" transform="rotate(-90 23 23)"/>
    </svg>
    <div class="progress-text"><b>${pct}%</b><br>${done} of ${total} exercises</div>
  `;
}
function renderSectionList() {
  const l = getLesson(); const list = document.getElementById('sectionList');
  if (!l) { list.innerHTML = ''; return; }
  list.innerHTML = l.sections.map((sec, idx) => {
    const isActive = sec.id === state.sectionId && !state.showHomework;
    const done = sectionAllDone(sec);
    return `
      <div class="section-item ${isActive ? 'active' : ''} ${done ? 'done' : ''}" data-section-id="${sec.id}">
        <span class="step-num" data-action="select" data-id="${sec.id}">${done ? '✓' : idx+1}</span>
        <span class="title" data-action="select" data-id="${sec.id}">${escapeHtml(sec.title)}</span>
        <span class="handle" data-action="up" data-id="${sec.id}" title="Move up">↑</span>
        <span class="menu-dots" data-action="delete" data-id="${sec.id}" title="Delete">✕</span>
      </div>
    `;
  }).join('');
}
function renderMain() {
  const main = document.getElementById('mainContent'); const lesson = getLesson();
  if (!lesson) { main.innerHTML = '<div class="empty-state">No lessons yet. Add a module or lesson.</div>'; return; }
  if (state.showHomework) { renderHomeworkView(main, lesson); return; }
  const sec = getSection();
  if (!sec) { main.innerHTML = '<div class="empty-state">Select a section on the left, or create a new one.</div>'; return; }
  if (state.mode === 'edit') renderEditView(main, sec); else renderStudyView(main, sec);
}
function renderHomeworkView(main, lesson) {
  main.innerHTML = `
    <div class="content-header"><h2 class="section-title-view">📌 For homework</h2></div>
    ${state.mode === 'edit' ? `<textarea class="body-editor" id="homeworkEditor" style="min-height:180px;">${escapeHtml(lesson.homework || '')}</textarea>` : renderBody(lesson.homework)}
  `;
  if (state.mode === 'edit') document.getElementById('homeworkEditor').addEventListener('input', (e) => { lesson.homework = e.target.value; saveCourse(); });
}
function renderEditView(main, sec) {
  main.innerHTML = `
    <div class="content-header">
      <input class="section-title-input" id="sectionTitleInput" value="${escapeHtml(sec.title)}">
      <button class="btn btn-danger-ghost btn-sm" id="deleteSectionBtn">Delete section</button>
    </div>
    <textarea class="body-editor" id="bodyEditor" placeholder="Plain text, **bold**, lines starting with - for lists. LIFEHACK: ... QUOTE: ... VOCAB: word | translation | note"></textarea>
    <div class="editor-hint">Markup: <b>LIFEHACK:</b> — lifehack card · <b>QUOTE:</b> — example-text card · <b>VOCAB: fi | en | note</b> — word cards (consecutive lines merge into a grid)</div>
    <div class="exercises-wrap">
      <div class="exercises-heading">Exercises (${(sec.exercises||[]).length})</div>
      <div id="exercisesList"></div>
      ${state.editingExerciseId === 'new' ? renderExerciseBuilder(null) : `<div class="add-exercise-card" id="addExerciseCard">+ Add exercise</div>`}
    </div>
  `;
  const bodyEditor = document.getElementById('bodyEditor');
  bodyEditor.value = sec.body || '';
  document.getElementById('sectionTitleInput').addEventListener('input', (e) => { sec.title = e.target.value; renderSectionList(); renderCrumb(); saveCourse(); });
  bodyEditor.addEventListener('input', (e) => { sec.body = e.target.value; saveCourse(); });
  document.getElementById('deleteSectionBtn').addEventListener('click', () => deleteSection(sec.id));

  const exList = document.getElementById('exercisesList');
  exList.innerHTML = (sec.exercises || []).map(ex => renderExerciseEditCard(ex)).join('');
  (sec.exercises || []).forEach(ex => {
    const editBtn = document.querySelector(`[data-edit-ex="${ex.id}"]`);
    const delBtn = document.querySelector(`[data-del-ex="${ex.id}"]`);
    if (editBtn) editBtn.addEventListener('click', () => { state.editingExerciseId = ex.id; renderMain(); });
    if (delBtn) delBtn.addEventListener('click', () => { sec.exercises = sec.exercises.filter(e => e.id !== ex.id); saveCourse(); renderMain(); renderSectionList(); });
  });
  if (state.editingExerciseId && state.editingExerciseId !== 'new') {
    const ex = (sec.exercises || []).find(e => e.id === state.editingExerciseId);
    if (ex) { const c = document.createElement('div'); c.innerHTML = renderExerciseBuilder(ex); exList.appendChild(c.firstElementChild); }
  }
  const addCard = document.getElementById('addExerciseCard');
  if (addCard) addCard.addEventListener('click', () => { state.editingExerciseId = 'new'; renderMain(); });
  wireBuilderForm(sec);
}

const TYPE_LABELS = { mc: 'Multiple choice', tf: 'True / False / Not stated', open: 'Open question', flash: 'Swipe flashcards', match: 'Match pairs', fill: 'Fill in the blank', order: 'Word order', diagnostic: 'Reading habits check' };
const TYPE_TAGCLASS = { mc: 'tag-mc', tf: 'tag-tf', open: 'tag-open', flash: 'tag-flash', match: 'tag-match', fill: 'tag-fill', order: 'tag-order', diagnostic: 'tag-diag' };

function renderExerciseEditCard(ex) {
  if (state.editingExerciseId === ex.id) return '';
  let qText = ex.question || ex.statement || ex.text || '';
  if (ex.type === 'flash') qText = `${ex.cards.length} cards: ${ex.cards.map(c=>c.front).join(', ')}`;
  if (ex.type === 'match') qText = `${ex.pairs.length} pairs: ${ex.pairs.map(p=>p.left).join(', ')}`;
  if (ex.type === 'order') qText = ex.words.join(' ');
  if (ex.type === 'diagnostic') qText = `${ex.questions.length}-question reading habits check with personalized feedback`;
  return `
    <div class="exercise-card">
      <span class="exercise-type-tag ${TYPE_TAGCLASS[ex.type]}">${TYPE_LABELS[ex.type]}</span>
      <div class="exercise-q">${escapeHtml(qText)}</div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button class="btn btn-sm" data-edit-ex="${ex.id}">Edit</button>
        <button class="btn btn-sm btn-danger-ghost" data-del-ex="${ex.id}">Delete</button>
      </div>
    </div>
  `;
}

function renderExerciseBuilder(ex) {
  const type = ex ? ex.type : 'mc';
  const options = ex && ex.options ? ex.options : [{text:'',correct:true},{text:'',correct:false}];
  const cards = ex && ex.cards ? ex.cards : [{front:'',back:''},{front:'',back:''}];
  const pairs = ex && ex.pairs ? ex.pairs : [{left:'',right:''},{left:'',right:''}];
  const orderSentence = ex && ex.words ? ex.words.join(' ') : '';
  return `
    <div class="exercise-card" id="builderCard">
      <div class="builder-form">
        <label>Exercise type</label>
        <select id="builderType">
          <option value="mc" ${type==='mc'?'selected':''}>Multiple choice</option>
          <option value="tf" ${type==='tf'?'selected':''}>True / False / Not stated</option>
          <option value="open" ${type==='open'?'selected':''}>Open question</option>
          <option value="flash" ${type==='flash'?'selected':''}>Swipe flashcards (Quizlet-style)</option>
          <option value="match" ${type==='match'?'selected':''}>Match pairs</option>
          <option value="fill" ${type==='fill'?'selected':''}>Fill in the blank</option>
          <option value="order" ${type==='order'?'selected':''}>Word order</option>
        </select>

        <div id="fld-mc" style="display:${type==='mc'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Question</label>
          <input type="text" id="builderQuestion" value="${escapeHtml(ex?.question || '')}">
          <label>Answer options (mark the correct one)</label>
          <div id="optionsWrap">${options.map((o,i) => `<div class="option-edit-row"><input type="radio" name="correctOpt" value="${i}" ${o.correct?'checked':''}><input type="text" data-opt-idx="${i}" value="${escapeHtml(o.text)}" placeholder="Option ${i+1}"></div>`).join('')}</div>
          <button class="btn btn-sm" id="addOptionBtn" type="button">+ Option</button>
        </div>

        <div id="fld-tf" style="display:${type==='tf'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Statement</label>
          <input type="text" id="builderStatement" value="${escapeHtml(ex?.statement || '')}">
          <label>Correct answer</label>
          <select id="builderTfAnswer">
            <option value="true" ${ex?.answer==='true'?'selected':''}>True</option>
            <option value="false" ${ex?.answer==='false'?'selected':''}>False</option>
            <option value="notstated" ${ex?.answer==='notstated'?'selected':''}>Not stated</option>
          </select>
        </div>

        <div id="fld-open" style="display:${type==='open'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Question</label>
          <input type="text" id="builderOpenQuestion" value="${escapeHtml(ex?.question || '')}">
          <label>Answer key (optional, for self-check)</label>
          <input type="text" id="builderOpenAnswer" value="${escapeHtml(ex?.answer || '')}">
        </div>

        <div id="fld-flash" style="display:${type==='flash'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Cards (term / translation)</label>
          <div id="cardsWrap">${cards.map((c,i) => `<div class="pair-edit-row"><input type="text" data-card-front="${i}" value="${escapeHtml(c.front)}" placeholder="Finnish"><input type="text" data-card-back="${i}" value="${escapeHtml(c.back)}" placeholder="Translation"></div>`).join('')}</div>
          <button class="btn btn-sm" id="addCardBtn" type="button">+ Card</button>
        </div>

        <div id="fld-match" style="display:${type==='match'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Pairs to match</label>
          <div id="pairsWrap">${pairs.map((p,i) => `<div class="pair-edit-row"><input type="text" data-pair-left="${i}" value="${escapeHtml(p.left)}" placeholder="Word"><input type="text" data-pair-right="${i}" value="${escapeHtml(p.right)}" placeholder="Translation"></div>`).join('')}</div>
          <button class="btn btn-sm" id="addPairBtn" type="button">+ Pair</button>
        </div>

        <div id="fld-fill" style="display:${type==='fill'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Sentence (mark the blank as ___)</label>
          <input type="text" id="builderFillText" value="${escapeHtml(ex?.text || '')}">
          <label>Correct word</label>
          <input type="text" id="builderFillAnswer" value="${escapeHtml(ex?.answer || '')}">
        </div>

        <div id="fld-order" style="display:${type==='order'?'flex':'none'}; flex-direction:column; gap:10px;">
          <label>Correct sentence (words separated by spaces)</label>
          <input type="text" id="builderOrderText" value="${escapeHtml(orderSentence)}" placeholder="Kirjasto on avoinna kello yhdeksästä">
        </div>

        <div style="display:flex; gap:8px; margin-top:6px;">
          <button class="btn btn-primary btn-sm" id="saveExerciseBtn">Save</button>
          <button class="btn btn-sm" id="cancelExerciseBtn">Cancel</button>
        </div>

  `;
}

function wireBuilderForm(sec) {
  const typeSel = document.getElementById('builderType');
  if (!typeSel) return;
  const allFields = ['mc','tf','open','flash','match','fill','order'];
  typeSel.addEventListener('change', () => { allFields.forEach(t => document.getElementById(`fld-${t}`).style.display = (t === typeSel.value) ? 'flex' : 'none'); });

  const addOptBtn = document.getElementById('addOptionBtn');
  if (addOptBtn) addOptBtn.addEventListener('click', () => {
    const wrap = document.getElementById('optionsWrap'); const idx = wrap.children.length;
    const div = document.createElement('div'); div.className = 'option-edit-row';
    div.innerHTML = `<input type="radio" name="correctOpt" value="${idx}"><input type="text" data-opt-idx="${idx}" placeholder="Option ${idx+1}">`;
    wrap.appendChild(div);
  });
  const addCardBtn = document.getElementById('addCardBtn');
  if (addCardBtn) addCardBtn.addEventListener('click', () => {
    const wrap = document.getElementById('cardsWrap'); const idx = wrap.children.length;
    const div = document.createElement('div'); div.className = 'pair-edit-row';
    div.innerHTML = `<input type="text" data-card-front="${idx}" placeholder="Finnish"><input type="text" data-card-back="${idx}" placeholder="Translation">`;
    wrap.appendChild(div);
  });
  const addPairBtn = document.getElementById('addPairBtn');
  if (addPairBtn) addPairBtn.addEventListener('click', () => {
    const wrap = document.getElementById('pairsWrap'); const idx = wrap.children.length;
    const div = document.createElement('div'); div.className = 'pair-edit-row';
    div.innerHTML = `<input type="text" data-pair-left="${idx}" placeholder="Word"><input type="text" data-pair-right="${idx}" placeholder="Translation">`;
    wrap.appendChild(div);
  });

  document.getElementById('cancelExerciseBtn').addEventListener('click', () => { state.editingExerciseId = null; renderMain(); });

  document.getElementById('saveExerciseBtn').addEventListener('click', () => {
    const type = typeSel.value;
    const existingId = (state.editingExerciseId !== 'new') ? state.editingExerciseId : null;
    let newEx;
    if (type === 'mc') {
      const question = document.getElementById('builderQuestion').value.trim();
      const optionInputs = Array.from(document.querySelectorAll('#optionsWrap [data-opt-idx]'));
      const correctIdx = Number(document.querySelector('input[name="correctOpt"]:checked')?.value ?? 0);
      const opts = optionInputs.map((inp, i) => ({ text: inp.value.trim(), correct: i === correctIdx })).filter(o => o.text);
      if (!question || opts.length < 2) { alert('Please fill in the question and at least 2 options'); return; }
      newEx = { id: existingId || uid(), type: 'mc', question, options: opts };
    } else if (type === 'tf') {
      const statement = document.getElementById('builderStatement').value.trim();
      const answer = document.getElementById('builderTfAnswer').value;
      if (!statement) { alert('Please fill in the statement'); return; }
      newEx = { id: existingId || uid(), type: 'tf', statement, answer };
    } else if (type === 'open') {
      const question = document.getElementById('builderOpenQuestion').value.trim();
      const answer = document.getElementById('builderOpenAnswer').value.trim();
      if (!question) { alert('Please fill in the question'); return; }
      newEx = { id: existingId || uid(), type: 'open', question, answer };
    } else if (type === 'flash') {
      const fronts = Array.from(document.querySelectorAll('#cardsWrap [data-card-front]'));
      const backs = Array.from(document.querySelectorAll('#cardsWrap [data-card-back]'));
      const cards = fronts.map((inp, i) => ({ front: inp.value.trim(), back: backs[i].value.trim() })).filter(c => c.front && c.back);
      if (cards.length < 2) { alert('Add at least 2 cards'); return; }
      newEx = { id: existingId || uid(), type: 'flash', cards };
    } else if (type === 'match') {
      const lefts = Array.from(document.querySelectorAll('#pairsWrap [data-pair-left]'));
      const rights = Array.from(document.querySelectorAll('#pairsWrap [data-pair-right]'));
      const pairs = lefts.map((inp, i) => ({ left: inp.value.trim(), right: rights[i].value.trim() })).filter(p => p.left && p.right);
      if (pairs.length < 2) { alert('Add at least 2 pairs'); return; }
      newEx = { id: existingId || uid(), type: 'match', pairs };
    } else if (type === 'fill') {
      const text = document.getElementById('builderFillText').value.trim();
      const answer = document.getElementById('builderFillAnswer').value.trim();
      if (!text || !text.includes('___')) { alert('The sentence must contain a blank ___'); return; }
      newEx = { id: existingId || uid(), type: 'fill', text, answer };
    } else {
      const orderText = document.getElementById('builderOrderText').value.trim();
      const words = orderText.split(/\s+/).filter(Boolean);
      if (words.length < 2) { alert('Enter at least 2 words'); return; }
      newEx = { id: existingId || uid(), type: 'order', words };
    }
    if (!sec.exercises) sec.exercises = [];
    if (existingId) { const i = sec.exercises.findIndex(e => e.id === existingId); sec.exercises[i] = newEx; } else { sec.exercises.push(newEx); }
    state.editingExerciseId = null;
    saveCourse(); renderMain(); renderSectionList();
  });
}

function downloadText(filename, text) {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function copyText(text, btnEl) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); if (btnEl) { const orig = btnEl.textContent; btnEl.textContent = 'Copied ✓'; setTimeout(() => btnEl.textContent = orig, 1500); } }
  catch (e) { console.error('copy failed', e); }
  document.body.removeChild(ta);
}
function quizletFormat(cards) { return cards.map(c => `${c.front}\t${c.back}`).join('\n'); }

function buildStudyExerciseNode(ex) {
  const container = document.createElement('div');
  const saved = progress[ex.id];

  if (ex.type === 'mc') {
    container.innerHTML = `<span class="exercise-type-tag ${TYPE_TAGCLASS.mc}">${TYPE_LABELS.mc}</span><div class="exercise-q">${escapeHtml(ex.question)}</div><div class="optsHolder"></div><div class="feedbackHolder"></div>`;
    const optsHolder = container.querySelector('.optsHolder');
    ex.options.forEach((opt, i) => {
      const row = document.createElement('div'); row.className = 'option-row'; row.textContent = opt.text;
      if (saved) { if (opt.correct) row.classList.add('correct-answer'); else if (saved.chosenIdx === i) row.classList.add('wrong-answer'); }
      row.addEventListener('click', () => {
        if (progress[ex.id]) return;
        const correct = !!opt.correct;
        progress[ex.id] = { status: correct ? 'correct' : 'incorrect', chosenIdx: i, at: Date.now() };
        saveProgress(); renderMain(); renderProgressRing(); renderModuleProgress(); renderSectionList();
      });
      optsHolder.appendChild(row);
    });
    if (saved) container.querySelector('.feedbackHolder').innerHTML = `<div class="feedback-box ${saved.status==='correct'?'feedback-correct':'feedback-wrong'}">${saved.status==='correct' ? 'Correct!' : 'Not quite — the correct option is highlighted in green.'}</div>`;
    return container;
  }

  if (ex.type === 'tf') {
    container.innerHTML = `<span class="exercise-type-tag ${TYPE_TAGCLASS.tf}">${TYPE_LABELS.tf}</span><div class="exercise-q">${escapeHtml(ex.statement)}</div><div class="optsHolder"></div><div class="feedbackHolder"></div>`;
    const optsHolder = container.querySelector('.optsHolder');
    const labels = { true: 'True', false: 'False', notstated: 'Not stated' };
    ['true','false','notstated'].forEach(val => {
      const row = document.createElement('div'); row.className = 'option-row'; row.textContent = labels[val];
      if (saved) { if (val === ex.answer) row.classList.add('correct-answer'); else if (saved.chosen === val) row.classList.add('wrong-answer'); }
      row.addEventListener('click', () => {
        if (progress[ex.id]) return;
        const correct = val === ex.answer;
        progress[ex.id] = { status: correct ? 'correct' : 'incorrect', chosen: val, at: Date.now() };
        saveProgress(); renderMain(); renderProgressRing(); renderModuleProgress(); renderSectionList();
      });
      optsHolder.appendChild(row);
    });
    if (saved) container.querySelector('.feedbackHolder').innerHTML = `<div class="feedback-box ${saved.status==='correct'?'feedback-correct':'feedback-wrong'}">${saved.status==='correct' ? 'Correct!' : 'Not quite — the correct option is highlighted in green.'}${ex.explain ? ' ' + escapeHtml(ex.explain) : ''}</div>`;
    return container;
  }

  if (ex.type === 'open') {
    const savedMode = saved?.mode || 'text';
    container.innerHTML = `
      <span class="exercise-type-tag ${TYPE_TAGCLASS.open}">${TYPE_LABELS.open}</span>
      <div class="exercise-q">${escapeHtml(ex.question)}</div>
      ${saved ? '' : `
        <div class="audio-answer-toggle">
          <button class="btn btn-sm active" id="toggleText-${ex.id}" type="button">Write answer</button>
          <button class="btn btn-sm" id="toggleAudio-${ex.id}" type="button">Record audio answer</button>
        </div>
      `}
      <div id="answerArea-${ex.id}"></div>
      <div class="feedbackHolder"></div>
    `;
    const answerArea = container.querySelector(`#answerArea-${ex.id}`);
    const fb = container.querySelector('.feedbackHolder');

    function renderTextMode() {
      answerArea.innerHTML = `
        <textarea class="body-editor" style="min-height:70px;" id="open-${ex.id}" ${saved?'disabled':''}>${saved && saved.mode !== 'audio' ? escapeHtml(saved.answerText||'') : ''}</textarea>
        <div style="margin-top:10px; display:flex; gap:8px;">${saved ? '' : `<button class="btn btn-primary btn-sm" id="submit-${ex.id}">Submit answer</button>`}</div>
      `;
      if (!saved) {
        answerArea.querySelector(`#submit-${ex.id}`).addEventListener('click', () => {
          const text = answerArea.querySelector(`#open-${ex.id}`).value;
          progress[ex.id] = { status: 'correct', mode: 'text', answerText: text, at: Date.now() };
          saveProgress(); renderMain(); renderProgressRing(); renderModuleProgress(); renderSectionList();
        });
      }
    }

    function renderAudioMode() {
      answerArea.innerHTML = `
        <div class="recorder-box">
          <button class="btn btn-sm" id="recBtn-${ex.id}">🎙 Start recording</button>
          <span class="rec-dot" id="recDot-${ex.id}" style="display:none;"></span>
          <span class="rec-timer" id="recTimer-${ex.id}"></span>
        </div>
        <div id="recPlayback-${ex.id}" style="margin-top:10px;"></div>
        <div class="audio-note">Microphone access depends on your browser/device permissions. If recording isn't available, switch to "Write answer" instead.</div>
        <div style="margin-top:10px;">${saved ? '' : `<button class="btn btn-primary btn-sm" id="submitAudio-${ex.id}" style="display:none;">Submit recording</button>`}</div>
      `;
      let mediaRecorder, chunks = [], timerInt, seconds = 0, recordedBlob = null;
      const recBtn = answerArea.querySelector(`#recBtn-${ex.id}`);
      const recDot = answerArea.querySelector(`#recDot-${ex.id}`);
      const recTimer = answerArea.querySelector(`#recTimer-${ex.id}`);
      const playback = answerArea.querySelector(`#recPlayback-${ex.id}`);
      const submitBtn = answerArea.querySelector(`#submitAudio-${ex.id}`);

      if (saved && saved.mode === 'audio' && saved.audioDataUrl) {
        playback.innerHTML = `<audio controls src="${saved.audioDataUrl}" style="width:100%; max-width:340px;"></audio>`;
      }

      if (!saved) recBtn.addEventListener('click', async () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); return; }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          chunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            recordedBlob = new Blob(chunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(recordedBlob);
            playback.innerHTML = `<audio controls src="${url}" style="width:100%; max-width:340px;"></audio>`;
            stream.getTracks().forEach(t => t.stop());
            clearInterval(timerInt);
            recDot.style.display = 'none';
            recBtn.textContent = '🎙 Record again';
            submitBtn.style.display = 'inline-block';
          };
          mediaRecorder.start();
          seconds = 0;
          recDot.style.display = 'inline-block'; recDot.classList.add('live');
          recTimer.textContent = '0:00';
          timerInt = setInterval(() => { seconds++; const m = Math.floor(seconds/60), s = seconds%60; recTimer.textContent = `${m}:${s.toString().padStart(2,'0')}`; }, 1000);
          recBtn.textContent = '⏹ Stop recording';
        } catch (e) {
          playback.innerHTML = `<div class="feedback-box feedback-wrong">Couldn\u2019t access the microphone in this environment. Please use "Write answer" instead.</div>`;
        }
      });

      if (submitBtn) submitBtn.addEventListener('click', () => {
        if (!recordedBlob) return;
        const reader = new FileReader();
        reader.onload = () => {
          progress[ex.id] = { status: 'correct', mode: 'audio', audioDataUrl: reader.result, at: Date.now() };
          saveProgress(); renderMain(); renderProgressRing(); renderModuleProgress(); renderSectionList();
        };
        reader.readAsDataURL(recordedBlob);
      });
    }

    if (saved) {
      if (saved.mode === 'audio') renderAudioMode(); else renderTextMode();
      fb.innerHTML = ex.answer ? `<div class="feedback-box feedback-correct">Answer key: ${escapeHtml(ex.answer)}</div>` : `<div class="feedback-box feedback-correct">Answer submitted.</div>`;
    } else {
      renderTextMode();
      const toggleTextBtn = container.querySelector(`#toggleText-${ex.id}`);
      const toggleAudioBtn = container.querySelector(`#toggleAudio-${ex.id}`);
      toggleTextBtn.addEventListener('click', () => { toggleTextBtn.classList.add('active'); toggleAudioBtn.classList.remove('active'); renderTextMode(); });
      toggleAudioBtn.addEventListener('click', () => { toggleAudioBtn.classList.add('active'); toggleTextBtn.classList.remove('active'); renderAudioMode(); });
    }
    return container;
  }

  if (ex.type === 'fill') {
    const parts = ex.text.split('___');
    container.innerHTML = `
      <span class="exercise-type-tag ${TYPE_TAGCLASS.fill}">${TYPE_LABELS.fill}</span>
      <div class="fill-sentence">${escapeHtml(parts[0])}<input type="text" class="fill-input" id="fillInput-${ex.id}" ${saved?'disabled':''} value="${saved ? escapeHtml(saved.value||'') : ''}">${escapeHtml(parts[1]||'')}</div>
      ${saved ? '' : `<button class="btn btn-primary btn-sm" id="checkFill-${ex.id}">Check</button>`}
      <div class="feedbackHolder"></div>
    `;
    const fb = container.querySelector('.feedbackHolder');
    if (saved) fb.innerHTML = `<div class="feedback-box ${saved.status==='correct'?'feedback-correct':'feedback-wrong'}">${saved.status==='correct' ? 'Correct!' : `Not quite — the correct answer is: ${escapeHtml(ex.answer)}`}</div>`;
    else setTimeout(() => {
      const btn = container.querySelector(`#checkFill-${ex.id}`);
      if (btn) btn.addEventListener('click', () => {
        const val = container.querySelector(`#fillInput-${ex.id}`).value.trim();
        const correct = val.toLowerCase() === ex.answer.trim().toLowerCase();
        progress[ex.id] = { status: correct ? 'correct' : 'incorrect', value: val, at: Date.now() };
        saveProgress(); renderMain(); renderProgressRing(); renderModuleProgress(); renderSectionList();
      });
    }, 0);
    return container;
  }

  if (ex.type === 'order') {
    if (!ephemeral[ex.id]) { const shuffled = ex.words.map((w, i) => ({ w, i })).sort(() => Math.random() - 0.5); ephemeral[ex.id] = { pool: shuffled, answer: [] }; }
    const es = ephemeral[ex.id];
    const isDone = !!saved;
    container.innerHTML = `
      <span class="exercise-type-tag ${TYPE_TAGCLASS.order}">${TYPE_LABELS.order}</span>
      <div class="exercise-q">Arrange the words into the correct sentence</div>
      <div class="order-answer" id="orderAnswer-${ex.id}"></div>
      <div class="order-tokens" id="orderPool-${ex.id}"></div>
      ${isDone ? '' : `<button class="btn btn-primary btn-sm" id="checkOrder-${ex.id}">Check</button>`}
      <div class="feedbackHolder"></div>
    `;
    const answerEl = container.querySelector(`#orderAnswer-${ex.id}`);
    const poolEl = container.querySelector(`#orderPool-${ex.id}`);
    function renderTokens() {
      answerEl.innerHTML = es.answer.map(item => `<span class="order-token">${escapeHtml(item.w)}</span>`).join('') || '<span style="color:var(--ink-faint); font-size:13px;">Click the words below to build the sentence</span>';
      poolEl.innerHTML = es.pool.map((item, idx) => `<span class="order-token ${item.used?'used':''}" data-idx="${idx}">${escapeHtml(item.w)}</span>`).join('');
      poolEl.querySelectorAll('.order-token').forEach(tok => {
        tok.addEventListener('click', () => {
          if (isDone) return;
          const idx = Number(tok.getAttribute('data-idx'));
          if (es.pool[idx].used) return;
          es.pool[idx].used = true;
          es.answer.push(es.pool[idx]);
          renderTokens();
        });
      });
    }
    renderTokens();
    if (isDone) {
      answerEl.innerHTML = ex.words.map(w => `<span class="order-token">${escapeHtml(w)}</span>`).join('');
      container.querySelector('.feedbackHolder').innerHTML = `<div class="feedback-box ${saved.status==='correct'?'feedback-correct':'feedback-wrong'}">${saved.status==='correct' ? 'Correct!' : 'Not quite — the correct order is shown above.'}</div>`;
    } else {
      setTimeout(() => {
        const btn = container.querySelector(`#checkOrder-${ex.id}`);
        if (btn) btn.addEventListener('click', () => {
          const userOrder = es.answer.map(item => item.w);
          const correct = JSON.stringify(userOrder) === JSON.stringify(ex.words);
          progress[ex.id] = { status: correct ? 'correct' : 'incorrect', at: Date.now() };
          saveProgress(); renderMain(); renderProgressRing(); renderModuleProgress(); renderSectionList();
        });
      }, 0);
    }
    return container;
  }

  if (ex.type === 'match') {
    if (!ephemeral[ex.id]) { const rightShuffled = [...ex.pairs].sort(() => Math.random() - 0.5); ephemeral[ex.id] = { selectedLeft: null, matched: new Set(), rightOrder: rightShuffled }; }
    const es = ephemeral[ex.id];
    const isComplete = saved && saved.status === 'complete';
    container.innerHTML = `
      <span class="exercise-type-tag ${TYPE_TAGCLASS.match}">${TYPE_LABELS.match}</span>
      <div class="exercise-q">Click a word on the left, then its translation on the right</div>
      <div class="match-grid"><div class="match-col" id="matchLeft-${ex.id}"></div><div class="match-col" id="matchRight-${ex.id}"></div></div>
      <div class="feedbackHolder"></div>
    `;
    const leftCol = container.querySelector(`#matchLeft-${ex.id}`);
    const rightCol = container.querySelector(`#matchRight-${ex.id}`);
    ex.pairs.forEach((p) => {
      const item = document.createElement('div'); item.className = 'match-item'; item.textContent = p.left;
      if (isComplete || es.matched.has(p.left)) item.classList.add('matched');
      item.addEventListener('click', () => { if (isComplete || es.matched.has(p.left)) return; es.selectedLeft = p.left; renderMain(); });
      if (es.selectedLeft === p.left) item.classList.add('selected');
      leftCol.appendChild(item);
    });
    es.rightOrder.forEach((p) => {
      const item = document.createElement('div'); item.className = 'match-item'; item.textContent = p.right;
      if (isComplete || es.matched.has(p.left)) item.classList.add('matched');
      item.addEventListener('click', () => {
        if (isComplete || es.matched.has(p.left) || !es.selectedLeft) return;
        if (es.selectedLeft === p.left) {
          es.matched.add(p.left); es.selectedLeft = null;
          if (es.matched.size === ex.pairs.length) { progress[ex.id] = { status: 'complete', at: Date.now() }; saveProgress(); renderProgressRing(); renderModuleProgress(); renderSectionList(); }
          renderMain();
        } else { item.classList.add('wrong-flash'); setTimeout(() => { es.selectedLeft = null; renderMain(); }, 500); }
      });
      rightCol.appendChild(item);
    });
    if (es.matched.size === ex.pairs.length || isComplete) container.querySelector('.feedbackHolder').innerHTML = `<div class="feedback-box feedback-correct">All pairs matched correctly!</div>`;
    return container;
  }

  if (ex.type === 'diagnostic') {
    if (!ephemeral[ex.id]) ephemeral[ex.id] = { idx: 0, tally: { great: 0, ontrack: 0, fix: 0 }, finished: (saved && saved.status === 'complete') };
    const es = ephemeral[ex.id];
    container.innerHTML = `<span class="exercise-type-tag ${TYPE_TAGCLASS.diagnostic}">${TYPE_LABELS.diagnostic}</span><div id="diagRoot-${ex.id}"></div>`;
    const root = container.querySelector(`#diagRoot-${ex.id}`);

    const RESULTS = {
      great: { cls: 'diag-great', title: 'Nice — you\u2019re doing this right!', text: 'Your instincts already match strong exam strategy. Keep reading a little Finnish every day and you\u2019ll walk into the exam confident.' },
      ontrack: { cls: 'diag-ontrack', title: 'You\u2019re on the right track', text: 'You\u2019ve got solid habits, with a couple of gaps. Revisit the lifehacks in this lesson\u2014they target exactly the spots that trip learners like you up.' },
      fix: { cls: 'diag-fix', title: 'Let\u2019s fix your direction now', text: 'A few habits here are working against you on exam day\u2014but they\u2019re very fixable. Go back through this section\u2019s lifehacks closely, and you\u2019ll be solidly ready for the real YKI.' }
    };

    function renderResult() {
      let top = 'great', max = -1;
      for (const k in es.tally) { if (es.tally[k] > max) { max = es.tally[k]; top = k; } }
      const r = RESULTS[top];
      root.innerHTML = `
        <div class="diag-result-card ${r.cls}">
          <div class="diag-result-title">${r.title}</div>
          <p style="margin:0; font-size:14px; line-height:1.6;">${r.text}</p>
          <div style="margin-top:14px;"><button class="btn btn-sm" id="diagRestart-${ex.id}">Retake</button></div>
        </div>
      `;
      root.querySelector(`#diagRestart-${ex.id}`).addEventListener('click', () => { ephemeral[ex.id] = { idx: 0, tally: { great: 0, ontrack: 0, fix: 0 }, finished: false }; renderMain(); });
      if (!saved || saved.status !== 'complete') { progress[ex.id] = { status: 'complete', at: Date.now(), result: top }; saveProgress(); renderProgressRing(); renderModuleProgress(); renderSectionList(); }
    }

    function renderQuestion() {
      if (es.idx >= ex.questions.length) { renderResult(); return; }
      const q = ex.questions[es.idx];
      root.innerHTML = `
        <div class="diag-progress">${ex.questions.map((_, i) => `<div class="diag-dot ${i < es.idx ? 'filled' : ''}"></div>`).join('')}</div>
        <div class="exercise-q">${escapeHtml(q.q)}</div>
        <div id="diagOpts-${ex.id}"></div>
      `;
      const optsHolder = root.querySelector(`#diagOpts-${ex.id}`);
      q.options.forEach(opt => {
        const row = document.createElement('div'); row.className = 'option-row'; row.textContent = opt.text;
        row.addEventListener('click', () => { es.tally[opt.tier]++; es.idx++; renderQuestion(); });
        optsHolder.appendChild(row);
      });
    }

    if (es.finished) renderResult(); else renderQuestion();
    return container;
  }

  if (ex.type === 'flash') {
    if (!ephemeral[ex.id]) ephemeral[ex.id] = { idx: 0, flipped: false, known: new Set(), dontknow: new Set(), finished: (saved && saved.status === 'complete') };
    const es = ephemeral[ex.id];

    container.innerHTML = `<span class="exercise-type-tag ${TYPE_TAGCLASS.flash}">${TYPE_LABELS.flash}</span><div id="flashRoot-${ex.id}"></div>`;
    const root = container.querySelector(`#flashRoot-${ex.id}`);

    function renderFlashSummary() {
      root.innerHTML = `
        <div class="flash-summary">
          <div class="section-title-view" style="font-size:20px;">Done!</div>
          <div class="flash-summary-stats">
            <span class="stat-pill stat-know">Know: ${es.known.size}</span>
            <span class="stat-pill stat-dontknow">Don't know: ${es.dontknow.size}</span>
          </div>
          <div class="export-row">
            ${es.dontknow.size > 0 ? `<button class="btn btn-sm" id="retryUnknown-${ex.id}">Retry unknown (${es.dontknow.size})</button>` : ''}
            <button class="btn btn-sm" id="restartFlash-${ex.id}">Start over</button>
            <button class="btn btn-gold btn-sm" id="exportQuizlet-${ex.id}">Export to Quizlet (.txt)</button>
            <button class="btn btn-sm" id="copyQuizlet-${ex.id}">Copy for Quizlet</button>
          </div>
        </div>
      `;
      root.querySelector(`#exportQuizlet-${ex.id}`).addEventListener('click', () => downloadText('quizlet-cards.txt', quizletFormat(ex.cards)));
      root.querySelector(`#copyQuizlet-${ex.id}`).addEventListener('click', (e) => copyText(quizletFormat(ex.cards), e.target));
      root.querySelector(`#restartFlash-${ex.id}`).addEventListener('click', () => { ephemeral[ex.id] = { idx: 0, flipped: false, known: new Set(), dontknow: new Set(), finished: false }; renderMain(); });
      const retryBtn = root.querySelector(`#retryUnknown-${ex.id}`);
      if (retryBtn) retryBtn.addEventListener('click', () => {
        const unknownFronts = Array.from(es.dontknow);
        ephemeral[ex.id] = { idx: 0, flipped: false, known: new Set(), dontknow: new Set(), finished: false, deck: ex.cards.filter(c => unknownFronts.includes(c.front)) };
        renderMain();
      });
      if (!saved || saved.status !== 'complete') { progress[ex.id] = { status: 'complete', at: Date.now(), known: es.known.size, dontknow: es.dontknow.size }; saveProgress(); renderProgressRing(); renderModuleProgress(); renderSectionList(); }
    }

    function renderFlashCard() {
      const deck = es.deck || ex.cards;
      if (es.idx >= deck.length) { renderFlashSummary(); return; }
      const card = deck[es.idx];
      const nextCard = deck[es.idx + 1];
      root.innerHTML = `
        <div class="flash-wrap">
          <div class="flash-stack">
            ${nextCard ? `<div class="flash-card behind">${escapeHtml(nextCard.front)}</div>` : ''}
            <div class="flash-card top" id="flashCard-${ex.id}">
              <span class="swipe-label dontknow" id="lblDont-${ex.id}">DON'T KNOW</span>
              <span class="swipe-label know" id="lblKnow-${ex.id}">KNOW</span>
              <span id="flashText-${ex.id}">${escapeHtml(card.front)}</span>
            </div>
          </div>
          <div class="flash-actions">
            <div class="flash-round-btn dontknow" id="btnDont-${ex.id}">✕</div>
            <span class="flash-counter">${es.idx+1} / ${deck.length}</span>
            <div class="flash-round-btn know" id="btnKnow-${ex.id}">♥</div>
          </div>
          <div class="flash-hint">Click the card to reveal the translation · swipe or use the buttons for know/don't know</div>
        </div>
      `;
      const cardEl = root.querySelector(`#flashCard-${ex.id}`);
      const textEl = root.querySelector(`#flashText-${ex.id}`);
      const lblKnow = root.querySelector(`#lblKnow-${ex.id}`);
      const lblDont = root.querySelector(`#lblDont-${ex.id}`);
      let flipped = false;
      let dragging = false, startX = 0, currentX = 0, moved = false;

      function commit(known) { if (known) es.known.add(card.front); else es.dontknow.add(card.front); es.idx++; es.flipped = false; renderFlashCard(); }

      function onPointerDown(e) { dragging = true; moved = false; startX = (e.touches ? e.touches[0].clientX : e.clientX); cardEl.classList.add('dragging'); }
      function onPointerMove(e) {
        if (!dragging) return;
        currentX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
        if (Math.abs(currentX) > 6) moved = true;
        cardEl.style.transform = `translateX(${currentX}px) rotate(${currentX/18}deg)`;
        lblKnow.style.opacity = Math.max(0, Math.min(1, currentX / 90));
        lblDont.style.opacity = Math.max(0, Math.min(1, -currentX / 90));
      }
      function onPointerUp() {
        if (!dragging) return;
        dragging = false;
        cardEl.classList.remove('dragging');
        if (Math.abs(currentX) > 90) {
          const known = currentX > 0;
          cardEl.style.transform = `translateX(${known ? 600 : -600}px) rotate(${known ? 30 : -30}deg)`;
          cardEl.style.opacity = '0';
          setTimeout(() => commit(known), 200);
        } else {
          cardEl.style.transform = ''; lblKnow.style.opacity = 0; lblDont.style.opacity = 0;
          if (!moved) { flipped = !flipped; cardEl.classList.toggle('flipped', flipped); textEl.textContent = flipped ? card.back : card.front; }
        }
        currentX = 0;
      }
      cardEl.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
      root.querySelector(`#btnKnow-${ex.id}`).addEventListener('click', () => commit(true));
      root.querySelector(`#btnDont-${ex.id}`).addEventListener('click', () => commit(false));
    }

    if (es.finished) renderFlashSummary(); else renderFlashCard();
    return container;
  }

  return container;
}

function deleteSection(id) {
  const l = getLesson();
  if (!l || l.sections.length <= 1) { alert('Can\u2019t delete the lesson\u2019s last section'); return; }
  if (!confirm('Delete this section?')) return;
  l.sections = l.sections.filter(s => s.id !== id);
  if (state.sectionId === id) state.sectionId = l.sections[0].id;
  saveCourse(); renderAll();
}
function addSection() {
  const l = getLesson(); if (!l) return;
  const newSec = { id: uid(), title: `Section ${l.sections.length + 1} — New section`, body: '', exercises: [] };
  l.sections.push(newSec); state.sectionId = newSec.id; state.showHomework = false;
  saveCourse(); renderAll();
}
function moveSectionUp(id) {
  const l = getLesson(); const idx = l.sections.findIndex(s => s.id === id);
  if (idx <= 0) return;
  [l.sections[idx-1], l.sections[idx]] = [l.sections[idx], l.sections[idx-1]];
  saveCourse(); renderSectionList();
}

function wireStaticEvents() {
  document.getElementById('modeEditBtn').addEventListener('click', () => {
    state.mode = 'edit'; document.getElementById('modeEditBtn').classList.add('active'); document.getElementById('modeStudyBtn').classList.remove('active'); renderMain();
  });
  document.getElementById('modeStudyBtn').addEventListener('click', () => {
    state.mode = 'study'; document.getElementById('modeStudyBtn').classList.add('active'); document.getElementById('modeEditBtn').classList.remove('active'); renderMain();
  });
  document.getElementById('moduleSelect').addEventListener('change', (e) => {
    state.moduleId = e.target.value; const m = getModule();
    state.lessonId = m.lessons[0]?.id || null; const l = getLesson();
    state.sectionId = l?.sections[0]?.id || null; state.showHomework = false;
    renderAll();
  });
  document.getElementById('lessonSelect').addEventListener('change', (e) => {
    state.lessonId = e.target.value; const l = getLesson();
    state.sectionId = l?.sections[0]?.id || null; state.showHomework = false;
    renderAll();
  });
  document.getElementById('addSectionBtn').addEventListener('click', addSection);
  document.getElementById('homeworkPin').addEventListener('click', () => { state.showHomework = true; renderSectionList(); renderMain(); });
  document.getElementById('sectionList').addEventListener('click', (e) => {
    const target = e.target; const action = target.getAttribute('data-action'); const id = target.getAttribute('data-id');
    if (!action) return;
    if (action === 'select') { state.sectionId = id; state.showHomework = false; state.editingExerciseId = null; renderSectionList(); renderMain(); }
    else if (action === 'up') moveSectionUp(id);
    else if (action === 'delete') deleteSection(id);
  });
}

(async function init() { await loadState(); wireStaticEvents(); renderAll(); })();
</script>
</body>
</html>
